# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Destinations - Prometheus
templates:
  - alloy-config.yaml
tests:
  - it: creates the Alloy components for an Prometheus destination
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: prometheus
          url: https://prometheus.example.com
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: allows you to disable keepIdentifyingResourceAttributes
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: prometheus
          url: https://prometheus.example.com
          openTelemetryConversion:
            keepIdentifyingResourceAttributes: false
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["config.alloy"]
          pattern: keep_identifying_resource_attributes = false
