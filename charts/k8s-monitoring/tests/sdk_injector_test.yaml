# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: SDK Injector
release:
  name: test-release
  namespace: observability
templates:
  - alloy.yaml
  - extra-objects.yaml
tests:
  - it: creates namespace-scoped ConfigMap writer RBAC for Alloy collectors when enabled
    set:
      cluster: {name: test-cluster}
      sdkInjector:
        enabled: true
      collectors:
        alloy-monitoring:
          extraConfig: "// Giving this Alloy something to do"
    asserts:
      - containsDocument:
          kind: Alloy
          apiVersion: collectors.grafana.com/v1alpha1
          name: test-release-alloy-monitoring
        template: alloy.yaml
      - notExists:
          path: spec.rbac
        template: alloy.yaml
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: apiVersion
          value: rbac.authorization.k8s.io/v1
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: metadata.name
          value: test-release-alloy-monitoring-sdk-injector
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: metadata.namespace
          value: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "create", "update"]
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: apiVersion
          value: rbac.authorization.k8s.io/v1
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: metadata.name
          value: test-release-alloy-monitoring-sdk-injector
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: metadata.namespace
          value: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: test-release-alloy-monitoring
            namespace: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: roleRef.name
          value: test-release-alloy-monitoring-sdk-injector
        template: extra-objects.yaml

  - it: does not create ConfigMap writer RBAC when disabled
    set:
      cluster: {name: test-cluster}
      sdkInjector:
        enabled: false
      collectors:
        alloy-monitoring:
          extraConfig: "// Giving this Alloy something to do"
    asserts:
      - containsDocument:
          kind: Alloy
          apiVersion: collectors.grafana.com/v1alpha1
          name: test-release-alloy-monitoring
        template: alloy.yaml
      - hasDocuments:
          count: 0
        template: extra-objects.yaml

  - it: binds the ConfigMap writer Role to an explicitly configured Alloy service account
    set:
      cluster: {name: test-cluster}
      sdkInjector:
        enabled: true
      collectors:
        alloy-monitoring:
          extraConfig: "// Giving this Alloy something to do"
          serviceAccount:
            name: custom-alloy
    asserts:
      - documentSelector:
          path: kind
          value: RoleBinding
        contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: custom-alloy
            namespace: observability
        template: extra-objects.yaml
