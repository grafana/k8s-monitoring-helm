# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: SDK Injector
release:
  name: test-release
  namespace: observability
templates:
  - beyla-config.yaml
  - extra-objects.yaml
tests:
  - it: creates namespace-scoped ConfigMap writer RBAC for the Beyla ServiceAccount when enabled
    set:
      cluster: {name: test-cluster}
      autoInstrumentation:
        enabled: true
      sdkInjector:
        enabled: true
    asserts:
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: apiVersion
          value: rbac.authorization.k8s.io/v1
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: metadata.name
          value: test-release-beyla-sdk-injector
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        equal:
          path: metadata.namespace
          value: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: Role
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "create", "update"]
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: apiVersion
          value: rbac.authorization.k8s.io/v1
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: metadata.name
          value: test-release-beyla-sdk-injector
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: metadata.namespace
          value: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: test-release-beyla
            namespace: observability
        template: extra-objects.yaml
      - documentSelector:
          path: kind
          value: RoleBinding
        equal:
          path: roleRef.name
          value: test-release-beyla-sdk-injector
        template: extra-objects.yaml

  - it: does not create ConfigMap writer RBAC when the SDK Injector is disabled
    set:
      cluster: {name: test-cluster}
      autoInstrumentation:
        enabled: true
      sdkInjector:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: extra-objects.yaml

  - it: does not create ConfigMap writer RBAC when auto-instrumentation is disabled
    set:
      cluster: {name: test-cluster}
      autoInstrumentation:
        enabled: false
      sdkInjector:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0
        template: extra-objects.yaml
