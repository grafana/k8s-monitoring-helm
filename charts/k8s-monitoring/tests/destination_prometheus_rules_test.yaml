# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Destinations - Prometheus Rules
templates:
  - alloy-config.yaml
  - validations.yaml
tests:
  - it: does not render mimir.rules.kubernetes when rules are disabled
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: http://prometheus.svc:9009/api/v1/push
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
      collectors: {alloy: {}}
    asserts:
      - notMatchRegex:
          path: data["config.alloy"]
          pattern: 'mimir\.rules\.kubernetes'

  - it: renders mimir.rules.kubernetes when rules.enabled is true
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: http://prometheus.svc:9009/api/v1/push
          rules:
            enabled: true
            namespaces: [default, monitoring]
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
      collectors: {alloy: {}}
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'mimir\.rules\.kubernetes "prometheus"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'rule_namespace \{\s*name = "default"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'rule_namespace \{\s*name = "monitoring"'

  - it: uses rules.address as the Ruler base URL when set, instead of url
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: https://prometheus-prod-XX.grafana.net/api/prom/push
          rules:
            enabled: true
            address: https://prometheus-prod-XX.grafana.net/
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
      collectors: {alloy: {}}
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'address = "https://prometheus-prod-XX\.grafana\.net/"'

  - it: falls back to url when rules.address is empty
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: http://prometheus.svc:9009/api/v1/push
          rules:
            enabled: true
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
      collectors: {alloy: {}}
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'address = "http://prometheus\.svc:9009/api/v1/push"'

  - it: only renders the block on the chosen collector
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: http://prometheus.svc:9009/api/v1/push
          rules:
            enabled: true
            collector: alloy-metrics
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
        collector: alloy-singleton
      collectors:
        alloy-singleton: {}
        alloy-metrics: {}
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-alloy-singleton
    asserts:
      - notMatchRegex:
          path: data["config.alloy"]
          pattern: 'mimir\.rules\.kubernetes'

  - it: fails when rules.collector references a missing collector
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prometheus:
          type: prometheus
          url: http://prometheus.svc:9009/api/v1/push
          rules:
            enabled: true
            collector: nonexistent
        loki:
          type: loki
          url: http://loki.svc:3100/api/push
      clusterEvents:
        enabled: true
      collectors: {alloy: {}}
    asserts:
      - failedTemplate:
          errorPattern: 'rules\.collector "nonexistent" is not an enabled collector'
