# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Destinations - OTLP
templates:
  - alloy-config.yaml
tests:
  - it: creates the Alloy components for an OTLP destination
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: otlp
          url: https://otlp.example.com
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: allows you to disable retry on failure
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: otlp
          url: https://otlp.example.com
          retryOnFailure:
            enabled: false
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: allows you to use basic authentication
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: otlp
          url: https://otlp.example.com
          auth:
            type: basic
            username: testuser
            password: testpassword
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: allows you to use basic authentication with a numeric username
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: otlp
          url: https://otlp.example.com
          auth:
            type: basic
            username: 12345
            password: testpassword
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: allows you to set per-signal paths when using http
    set:
      cluster: {name: test-cluster}
      collectors: {alloy-singleton: {extraConfig: " ", includeDestinations: ["test"]}}
      selfReporting: {enabled: false}
      destinations:
        test:
          type: otlp
          protocol: http
          url: http://custom-backend.monitoring.svc.cluster.local:4318
          metrics:
            path: v2/metric/otlp
          logs:
            path: v2/log/otlp
          traces:
            path: v2/trace/otlp
          tls:
            insecure: true
            insecureSkipVerify: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

