---
cluster:
  name: standard-cluster

collectorCommon:
  alloy:
    remoteConfig:
      enabled: true
      url: https://remote-config.example.com/alloy
      auth:
        type: basic
        username: 12345
        password: my-remote-cfg-password

collectors:
  alloy-daemonset:
    presets: [large, privileged, clustered, daemonset]

  alloy-deployment:
    presets: [large, clustered, deployment]

# Add these if Kubernetes monitoring is enabled
telemetryServices:
  node-exporter:
    deploy: true

  kube-state-metrics:
    deploy: true
