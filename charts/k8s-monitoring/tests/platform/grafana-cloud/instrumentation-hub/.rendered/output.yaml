apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8smon-k8s-injection-controller
  namespace: default
  labels:
    helm.sh/chart: sdkInjector-0.1.0
    app.kubernetes.io/name: k8s-injection-controller
    app.kubernetes.io/instance: k8smon
    control-plane: controller-manager
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-injection-controller
      app.kubernetes.io/instance: k8smon
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        # Roll the pod whenever the mounted SDK config changes.
        checksum/sdk-config: fe7f2dca216f486ece1f27aefa0a4a7c4035566a67920cacd76fe20f816277e3
        # Advertise the metrics endpoint for annotation-based Prometheus discovery.
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: k8s-injection-controller
        app.kubernetes.io/instance: k8smon
        control-plane: controller-manager
    spec:
      serviceAccountName: k8smon-k8s-injection-controller
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "ghcr.io/grafana/k8s-injection-controller:main"
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            - --leader-elect
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            - --enable-cert-rotation
            - --webhook-cert-secret=k8smon-k8s-injection-controller-serving-cert
            - --mutating-webhook-name=k8smon-k8s-injection-controller-mutating-webhook
            - --validating-webhook-name=k8smon-k8s-injection-controller-validating-webhook
            - --metrics-bind-address=:8080
            - --metrics-secure=false
            - --config=/etc/beyla-injector/sdk-inject.yaml
          env:
            # Dialed by the controller before its first eviction sweep so it
            # waits for the webhook Service VIP to be programmed.
            - name: WEBHOOK_SERVICE_ADDR
              value: k8smon-k8s-injection-controller-webhook.default.svc:443
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WATCH_NAMESPACE
              value: "default"
            - name: ALLOWED_CONFIGMAP_WRITERS
              value: "system:serviceaccount:$(POD_NAMESPACE):k8smon-alloy"
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: webhook-server
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              # Read-only in both modes. In self-signed mode the cert rotator
              # writes the Secret via the API (not this dir); the kubelet projects
              # it here. cert-controller never writes the cert dir itself.
              readOnly: true
            - name: sdk-config
              mountPath: /etc/beyla-injector
              readOnly: true
      volumes:
        - name: webhook-certs
          # Mount the serving-cert Secret in both modes. cert-manager populates
          # it in cert-manager mode; the in-process cert rotator populates it in
          # self-signed mode. cert-controller writes only the Secret (via the
          # API) and waits for the kubelet to project it onto disk here — it does
          # NOT write the cert dir, so a writable emptyDir would never get a cert
          # and the rotator's readiness gate would never fire.
          secret:
            secretName: k8smon-k8s-injection-controller-serving-cert
        - name: sdk-config
          configMap:
            name: k8smon-k8s-injection-controller-sdk-config
