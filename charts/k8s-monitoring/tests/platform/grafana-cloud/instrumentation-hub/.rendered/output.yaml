# Source: k8s-monitoring/templates/alloy-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8smon-my-collector
  namespace: default
data:
  config.alloy: |
    remote.kubernetes.secret "my_collector_remote_cfg" {
      name      = "grafana-cloud-credentials"
      namespace = "default"
    } // remote.kubernetes.secret "my_collector_remote_cfg"
    
    remotecfg {
      id = string.format("k8smon-%s-%s-%s-%s", "instrumentation-hub-test-cluster", "default", "my-collector", sys.env("K8S_NODE_NAME"))
      url = "https://fleet-management-prod-008.grafana.net"
      basic_auth {
        username = convert.nonsensitive(remote.kubernetes.secret.my_collector_remote_cfg.data["GRAFANA_CLOUD_FLEET_MGMT_USER"])
        password = remote.kubernetes.secret.my_collector_remote_cfg.data["GRAFANA_CLOUD_FLEET_MGMT_TOKEN"]
      }
      tls_config {
        insecure_skip_verify = false
        ca_pem = convert.nonsensitive(remote.kubernetes.secret.my_collector_remote_cfg.data["ca"])
        cert_pem = convert.nonsensitive(remote.kubernetes.secret.my_collector_remote_cfg.data["cert"])
        key_pem = remote.kubernetes.secret.my_collector_remote_cfg.data["key"]
      }
      poll_frequency = "5m"
      attributes = {
        "cluster" = "instrumentation-hub-test-cluster",
        "namespace" = "default",
        "platform" = "kubernetes",
        "release" = "k8smon",
        "service-discovery" = "true",
        "source" = "k8s-monitoring",
        "sourceVersion" = "4.1.7",
        "workloadName" = "my-collector",
        "workloadType" = "daemonset",
      }
    }
