# Source: k8s-monitoring/charts/telemetryServices/charts/sdkInjector/templates/sdk-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8smon-k8s-injection-controller-sdk-config
  namespace: default
  labels:
    helm.sh/chart: sdkInjector-0.1.0
    app.kubernetes.io/name: k8s-injection-controller
    app.kubernetes.io/instance: k8smon
    control-plane: controller-manager
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
data:
  # config.SDKInject document consumed by the controller via --config. The
  # controller selects matching workloads but performs no mutation when this is
  # absent (image_volume_root empty).
  sdk-inject.yaml: |
    debug: false
    image_volume_root: ghcr.io/grafana/beyla/inject-sdk-image
    image_version: "0.0.13"
    injection_mode: auto
    propagators:
      - tracecontext
      - baggage
    export:
      traces: true
      metrics: true
      logs: false
    enabled_sdks:
      - nodejs
      - python
      - java
      - dotnet
