---
cluster:
  name: gke-autopilot-test

destinations:
  - name: grafana-cloud-metrics
    type: prometheus
    url: https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom/push
    auth:
      type: basic
      usernameKey: PROMETHEUS_USER
      passwordKey: PROMETHEUS_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default
  - name: grafana-cloud-logs
    type: loki
    url: https://logs-prod-006.grafana.net/loki/api/v1/push
    auth:
      type: basic
      usernameKey: LOKI_USER
      passwordKey: LOKI_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default
  - name: grafana-cloud-traces
    type: otlp
    url: https://tempo-prod-04-prod-us-east-0.grafana.net/tempo
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}
    auth:
      type: basic
      usernameKey: TEMPO_USER
      passwordKey: TEMPO_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default

clusterMetrics:
  enabled: true
  kubelet: {enabled: false}
  kubeletResource: {enabled: false}
  cadvisor: {enabled: false}
  node-exporter:
    deploy: false
    enabled: false
  windows-exporter:
    deploy: false
    enabled: false

clusterEvents:
  enabled: true

podLogs:
  enabled: true

selfReporting: {scrapeInterval: 1m}  # Force self-report to be generated within test time

alloy-metrics:
  enabled: true
alloy-singleton:
  enabled: true
alloy-logs:
  enabled: true
  alloy:
    mounts:
      dockercontainers: false
