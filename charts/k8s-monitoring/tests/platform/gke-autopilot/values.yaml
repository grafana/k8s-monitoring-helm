---
cluster:
  name: gke-autopilot-test

destinations:
  - name: grafana-cloud-metrics
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
    auth:
      type: basic
      usernameKey: PROMETHEUS_USER
      passwordKey: PROMETHEUS_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default
  - name: grafana-cloud-logs
    type: loki
    url: https://logs-prod-006.grafana.net/loki/api/v1/push
    auth:
      type: basic
      usernameKey: LOKI_USER
      passwordKey: LOKI_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default
  - name: grafana-cloud-traces
    type: otlp
    url: https://tempo-prod-04-prod-us-east-0.grafana.net/tempo
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}
    auth:
      type: basic
      usernameKey: TEMPO_USER
      passwordKey: TEMPO_PASS
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: default

clusterMetrics:
  enabled: true
  node-exporter:
    deploy: false
    enabled: false
  windows-exporter:
    deploy: false
    enabled: false

clusterEvents:
  enabled: true

podLogs:
  enabled: true

alloy-metrics:
  enabled: true
alloy-singleton:
  enabled: true
alloy-logs:
  enabled: true
  alloy:
    mounts:
      dockercontainers: false
