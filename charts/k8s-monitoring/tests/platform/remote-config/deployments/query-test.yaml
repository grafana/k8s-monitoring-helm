---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: k8s-monitoring-test
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/grafana/k8s-monitoring-helm
  ref:
    branch: main
  ignore: |
    /*
    !/charts/k8s-monitoring-test
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring-test
spec:
  interval: 1m
  chart:
    spec:
      chart: charts/k8s-monitoring-test
      sourceRef:
        kind: GitRepository
        name: k8s-monitoring-test
      interval: 1m
  values:
    tests:
      - envFrom:
          - secretRef:
              name: grafana-cloud-credentials
          - configMapRef:
              name: test-variables
        queries:
          - query: alloy_build_info{cluster="remote-config-platform-test", random="$RANDOM_NUMBER"}
            type: promql
