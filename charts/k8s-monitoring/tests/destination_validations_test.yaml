# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Validations - Destinations
templates:
  - validations.yaml
tests:
  - it: asks you to set a valid name for the destination
    set:
      cluster: {name: test-cluster}
      clusterMetrics: {enabled: true}
      telemetryServices: {kube-state-metrics: {deploy: true}}
      destinations:
        prøm3thüs!:
          type: prometheus
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "prøm3thüs!" has invalid characters in its name.
            Please only use alphanumeric, underscores, or dashes.

  - it: requires a destination type
    set:
      cluster: {name: test-cluster}
      clusterMetrics: {enabled: true}
      telemetryServices: {kube-state-metrics: {deploy: true}}
      destinations:
        "a-destination-with-no-type": {}
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "a-destination-with-no-type" does not have a type.
            Please set:
            destinations:
              a-destination-with-no-type:
                type: custom, loki-stdout, loki, otlp, prometheus, or pyroscope

  - it: validates the destination type
    set:
      cluster: {name: test-cluster}
      clusterMetrics: {enabled: true}
      telemetryServices: {kube-state-metrics: {deploy: true}}
      destinations:
        a-destination-with-an-invalid-type:
          type: invalidType
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "a-destination-with-an-invalid-type" is using an unknown type: invalidType
            Please set:
            destinations:
              a-destination-with-an-invalid-type:
                type: custom, loki-stdout, loki, otlp, prometheus, or pyroscope

  - it: allows destination names with alphanumeric, underscores, and dashes
    set:
      cluster: {name: test-cluster}
      clusterMetrics: {enabled: true}
      telemetryServices: {kube-state-metrics: {deploy: true}}
      collectors: {alloy-metrics: {}}
      destinations:
        This-is-my_Prometheus_destination-1:
          type: prometheus
    asserts:
      - notFailedTemplate: {}

  - it: detects if you're using an otlp destination with an invalid protocol
    set:
      cluster:
        name: test-cluster
      destinations:
        my-destination:
          type: otlp
          url: https://otlp.example.com
          protocol: magic
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "my-destination" has an unsupported protocol: magic.
            The protocol must be either "grpc" or "http"
            Please set:
            destinations:
              my-destination:
                type: otlp
                protocol: otlp / http

  - it: detects if you're using a grpc otlp destination with the proxyURL
    set:
      cluster:
        name: test-cluster
      destinations:
        my-destination:
          type: otlp
          url: https://otlp.example.com
          proxyURL: https://myproxy.default.svc:8080
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "my-destination" does not support proxyURL.
            When using the gPRC protocol, the proxyURL option is not supported.
            Please remove the proxyURL field and set the appropriate environment variables on the Alloy instances.
            Or, change to use the http protocol:
            destinations:
              my-destination:
                type: otlp
                protocol: http
            For more information, see https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring/docs/examples/proxies

  - it: detects if you're using the Grafana Cloud OTLP endpoint with the wrong protocol
    set:
      cluster:
        name: test-cluster
      destinations:
        OTLP-Endpoint:
          type: otlp
          url: https://otlp-gateway-test.grafana.net
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "OTLP-Endpoint" is using Grafana Cloud OTLP gateway but has incorrect protocol 'grpc (default)'. The gateway requires 'http'.
            Please set:
            destinations:
              OTLP-Endpoint:
                type: otlp
                url: https://otlp-gateway-test.grafana.net
                protocol: http

  - it: can skip the Grafana Cloud OTLP endpoint protocol validation
    set:
      cluster:
        name: test-cluster
      destinations:
        OTLP-Endpoint:
          type: otlp
          url: https://otlp-gateway-test.grafana.net
          protocolValidation: false
      collectors: {alloy-receiver: {extraConfig: "// simulated feature"}}
    asserts:
      - notFailedTemplate: {}

  - it: detects if you're using Grafana Cloud Traces with the wrong protocol
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-prod-01-prod-us-east-1.grafana.net
          protocol: http
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "Grafana-Cloud-Traces" is using Grafana Cloud Traces but has incorrect protocol 'http'. Grafana Cloud Traces requires 'grpc'.
            Please set:
            destinations:
              Grafana-Cloud-Traces:
                type: otlp
                url: https://tempo-prod-01-prod-us-east-1.grafana.net
                protocol: grpc

  - it: can skip the Grafana Cloud Traces protocol validation
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-prod-01-prod-us-east-1.grafana.net
          protocol: http
          protocolValidation: false
          metrics: {enabled: false}
          logs: {enabled: false}
      collectors: {alloy-receiver: {extraConfig: "// simulated feature"}}
    asserts:
      - notFailedTemplate: {}

  - it: does not warn about the wrong protocol if using the AWS PrivateLink address
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-prod-01.us-east-1.vpce.grafana.net
          protocol: http
      collectors: {alloy-receiver: {extraConfig: "// simulated feature"}}
    asserts:
      - notFailedTemplate: {}

  - it: detects if metrics are enabled for Grafana Cloud Traces
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-test.grafana.net
          metrics: {enabled: true}
          logs: {enabled: false}
          traces: {enabled: true}
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "Grafana-Cloud-Traces" is using Grafana Cloud Traces but has metrics enabled. Tempo only supports traces.
            Please set:
            destinations:
              Grafana-Cloud-Traces:
                type: otlp
                url: https://tempo-test.grafana.net
                metrics:
                  enabled: false

  - it: detects if logs are enabled for Grafana Cloud Traces
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-test.grafana.net
          metrics: {enabled: false}
          logs: {enabled: true}
          traces: {enabled: true}
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "Grafana-Cloud-Traces" is using Grafana Cloud Traces but has logs enabled. Tempo only supports traces.
            Please set:
            destinations:
              Grafana-Cloud-Traces:
                type: otlp
                url: https://tempo-test.grafana.net
                logs:
                  enabled: false

  - it: detects if traces are disabled for Grafana Cloud Traces
    set:
      cluster:
        name: test-cluster
      destinations:
        Grafana-Cloud-Traces:
          type: otlp
          url: https://tempo-test.grafana.net
          protocol: grpc
          metrics: {enabled: false}
          logs: {enabled: false}
          traces: {enabled: false}
    asserts:
      - failedTemplate:
          errorMessage: |-
            Destination "Grafana-Cloud-Traces" is using Grafana Cloud Traces but has traces disabled.
            Please set:
            destinations:
              Grafana-Cloud-Traces:
                type: otlp
                url: https://tempo-test.grafana.net
                traces:
                  enabled: true

