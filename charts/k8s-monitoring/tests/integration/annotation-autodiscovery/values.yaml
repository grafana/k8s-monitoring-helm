---
cluster:
  name: annotation-autodiscovery-test

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
  pods:
    labelSelectors:
      color: blue
    labels:
      color: color

  # Persist the scrape interval and timeout values, so we can test the values are set correctly.
  extraDiscoveryRules: |-
    rule {
      source_labels = ["__scrape_interval__"]
      target_label = "scrape_interval"
    }
    rule {
      source_labels = ["__scrape_timeout__"]
      target_label = "scrape_timeout"
    }

podLogsViaLoki:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    controller:
      replicas: 2

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
