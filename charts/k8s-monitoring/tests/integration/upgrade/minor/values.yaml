---
cluster:
  name: minor-upgrade-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
    auth:
      type: basic
      username: promuser
      password: prometheuspassword
    extraLabelsFrom:
      chart_version: remote.kubernetes.configmap.version.data["version"]
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
    extraLabelsFrom:
      chart_version: remote.kubernetes.configmap.version.data["version"]

clusterMetrics:
  enabled: true
  collector: alloy-metrics

costMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  energyMetrics:
    enabled: true
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogs:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    extraConfig: |-
      remote.kubernetes.configmap "version" {
        name = "k8smon-version"
        namespace = "toolbox"
      }

  alloy-singleton:
    presets: [singleton]
    extraConfig: |-
      remote.kubernetes.configmap "version" {
        name = "k8smon-version"
        namespace = "toolbox"
      }

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    extraConfig: |-
      remote.kubernetes.configmap "version" {
        name = "k8smon-version"
        namespace = "toolbox"
      }

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: k8smon-version
      namespace: toolbox
    data:
      version: "{{ .Chart.Version }}"

telemetryServices:
  kube-state-metrics:
    deploy: true
  kepler:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
  opencost:
    deploy: true
    metricsSource: localPrometheus
    opencost:
      exporter:
        defaultClusterId: minor-upgrade-test
      prometheus:
        existingSecretName: localprometheus-k8smon-k8s-monitoring
        external:
          url: http://prometheus-server.prometheus.svc:9090
