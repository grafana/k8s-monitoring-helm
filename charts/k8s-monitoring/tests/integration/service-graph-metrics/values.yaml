---
cluster:
  name: service-graph-metrics-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
  localTempo:
    type: otlp
    url: tempo.tempo.svc:4317
    tls:
      insecure: true
      insecureSkipVerify: true
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}
    processors:
      serviceGraphMetrics:
        enabled: true
        collector:
          controller:
            replicas: 3
        receiver:
          otlp:
            grpc:
              maxReceivedMessageSize: 8MB
        cacheLoop: 2m
        dimensions:
          - cluster
          - service.name
          - service.namespace
          - k8s.deployment.name
          - k8s.namespace.name
        metricsFlushInterval: 60s
        storeExpirationLoop: 5s

applicationObservability:
  enabled: true
  collector: alloy-receiver
  traces:
    transforms:
      span:
        - replace_pattern(name, "\\?.*", "")
        - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")

  receivers:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true

podLogsViaOpenTelemetry:
  enabled: true
  collector: alloy-logs
  namespaceLabels:
    color: color

collectors:
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    alloy:
      stabilityLevel: public-preview

  alloy-receiver:
    presets: [deployment]

  alloy-metrics:
    presets: [clustered, statefulset]

integrations:
  collector: alloy-metrics
  alloy:
    instances:
      - name: alloy-receiver
        labelSelectors:
          app.kubernetes.io/instance: k8smon-alloy-receiver
        metrics:
          tuning:
            includeMetrics: [otelcol_loadbalancer_.*]
      - name: alloy-servicegraph
        labelSelectors:
          app.kubernetes.io/instance: k8smon-localtempo-servicegraph
        metrics:
          tuning:
            includeMetrics: [traces_service_graph_request_.*]
