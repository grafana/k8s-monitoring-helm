---
cluster:
  name: prom-and-loki-to-otlp-test

destinations:
  prometheus:
    type: otlp
    protocol: http
    url: http://prometheus-server.prometheus.svc:9090/api/v1/otlp
    auth:
      type: basic
      username: promuser
      password: prometheuspassword
    tls:
      insecureSkipVerify: true
    metrics: {enabled: true}
    logs: {enabled: false}
    traces: {enabled: false}
    clusterLabels: [k8s.cluster.name]

  loki:
    type: otlp
    protocol: http
    url: http://loki.loki.svc:3100/otlp
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
    metrics: {enabled: false}
    logs: {enabled: true}
    traces: {enabled: false}
    clusterLabels: [k8s.cluster.name]

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  structuredMetadata:
    k8s.pod.name: null
    pod: null

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]

  alloy-singleton:
    presets: [singleton]

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
