---
cluster:
  name: auto-instrumentation-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
  localTempo:
    type: otlp
    url: tempo.tempo.svc:4317
    tls:
      insecure: true
      insecureSkipVerify: true
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

autoInstrumentation:
  enabled: true
  collector: alloy-metrics
  beyla:
    config:
      data:
        discovery:
          instrument:
            - k8s_namespace: default
            - k8s_namespace: prometheus

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      grpc:
        enabled: true

collectors:
  alloy-metrics:
    liveDebugging:
      enabled: true

  alloy-receiver:
    alloy:
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
