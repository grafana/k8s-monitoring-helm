---
cluster:
  name: proxies-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
    proxyURL: http://proxy-server.proxy.svc:8888
    tls:
      insecureSkipVerify: true

  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    proxyURL: http://proxy-server.proxy.svc:8888
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
    tls:
      insecureSkipVerify: true

  localTempo:
    type: otlp
    protocol: http
    url: http://tempo.tempo.svc:4318
    proxyURL: http://proxy-server.proxy.svc:8888
    tls:
      insecure: true
      insecureSkipVerify: true
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogs:
  enabled: true
  collector: alloy-logs

integrations:
  collector: alloy-metrics
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name: [alloy-metrics, alloy-singleton, alloy-logs, alloy-receiver]

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      grpc:
        enabled: true
  connectors:
    grafanaCloudMetrics:
      enabled: true

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]

  alloy-singleton:
    presets: [singleton]

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]

  alloy-receiver:
    extraConfig: |
      remote.http "url_test" {
        url = "https://api.github.com/users/grafana/repos"
      }
