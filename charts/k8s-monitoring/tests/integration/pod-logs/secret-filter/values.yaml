---
cluster:
  name: pod-logs-feature-test

destinations:
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  secretFilter:
    enabled: true
    redactWith: "<REDACTED:$SECRET_NAME>"
    inclusionSelector: '{namespace="development"}'

collectors:
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    alloy:
      stabilityLevel: experimental
