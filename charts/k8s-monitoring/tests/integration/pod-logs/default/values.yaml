---
cluster:
  name: pod-logs-feature-test

destinations:
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    batchSize: "1MiB"
    batchWait: "1s"
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

podLogs:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
