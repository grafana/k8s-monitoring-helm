---
cluster:
  name: pod-logs-feature-test

destinations:
  - name: localLoki
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

podLogs:
  enabled: true
  gatherMethod: filelog
  namespaces:
    - default
    - development
    - production
    - flux-system

alloy-logs:
  enabled: true
  liveDebugging:
    enabled: true
  alloy:
    stabilityLevel: public-preview
