---
cluster:
  name: cluster-monitoring-feature-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
    auth:
      type: basic
      username: promuser
      password: prometheuspassword
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

costMetrics:
  enabled: true
  collector: alloy-metrics
  opencost:
    enabled: true

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  energyMetrics:
    enabled: true

clusterMetrics:
  enabled: true
  collector: alloy-metrics

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogs:
  enabled: true
  collector: alloy-logs

telemetryServices:
  node-exporter:
    deploy: true
  kepler:
    deploy: true
  kube-state-metrics:
    deploy: true
  opencost:
    deploy: true
    metricsSource: localPrometheus
    opencost:
      exporter:
        defaultClusterId: cluster-monitoring-feature-test
      prometheus:
        existingSecretName: localprometheus-k8smon-k8s-monitoring
        external:
          url: http://prometheus-server.prometheus.svc:9090

collectors:
  alloy-metrics: {}

  alloy-singleton: {}

  alloy-logs: {}

