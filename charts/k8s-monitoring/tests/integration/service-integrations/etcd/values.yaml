---
cluster:
  name: etcd-integration-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write

integrations:
  collector: alloy-metrics
  etcd:
    instances:
      - name: etcd
        namespaces: [kube-system]
        labelSelectors:
          component: etcd

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
