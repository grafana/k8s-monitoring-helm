---
cluster:
  name: sharded-kube-state-metrics-test

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true

collectors:
  alloy-metrics: {}

telemetryServices:
  kube-state-metrics:
    deploy: true
    autosharding:
      enabled: true
    replicas: 5
    podAnnotations:
      k8s.grafana.com/scrape: "true"
      k8s.grafana.com/job: "kube-state-metrics-internal"
      k8s.grafana.com/metrics.portNumber: "8081"
  node-exporter:
    deploy: true
