# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Pod Logs
templates:
  - alloy-config.yaml
  - validations.yaml
tests:
  - it: requires a log destination
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      podLogs:
        enabled: true
      collectors:
        alloy-logs:
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - failedTemplate:
          errorMessage: |-
            No destinations found that can accept logs from the Kubernetes Pod logs feature.
            Please add a destination with logs support.
            See https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/destinations/README.md for more details.

  - it: requires a collector
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        loki:
          type: loki
          url: http://loki.loki.svc:3100/api/push
      podLogs:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: |-
            At least one collector should be enabled
            Please enable one by setting:
            collectors:
              <collector-name>:
                <collector-settings>
            See https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/collectors/README.md for more details.

  - it: renders the config to gather Kubernetes Pod logs
    template: alloy-config.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        loki:
          type: loki
          url: http://loki.loki.svc:3100/api/push
      podLogs:
        enabled: true
      collectors:
        alloy-logs:
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["config.alloy"]

  - it: requires public-preview stability level if filelog gathering is enabled
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        loki:
          type: loki
          url: http://loki.loki.svc:3100/api/push
      podLogs:
        enabled: true
        gatherMethod: filelog
      collectors:
        alloy-logs:
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - failedTemplate:
          errorMessage: |-
            Pod Logs feature requires Alloy to use the public-preview stability level when using the "filelog" gather method.
            Please set:
            alloy-logs:
              alloy:
                stabilityLevel: public-preview

  - it: requires experimental stability level if secret filtering is enabled
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        loki:
          type: loki
          url: http://loki.loki.svc:3100/api/push
      podLogs:
        enabled: true
        secretFilter:
          enabled: true
      collectors:
        alloy-logs:
          presets: [filesystem-log-reader, daemonset]
    asserts:
      - failedTemplate:
          errorMessage: |-
            Pod Logs feature requires Alloy to use the experimental stability level when using the secretFilter.
            Please set:
            alloy-logs:
              alloy:
                stabilityLevel: experimental
