# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Annotation Autodiscovery
templates:
  - alloy-config.yaml
  - validations.yaml
tests:
  - it: requires a metrics destination
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      annotationAutodiscovery:
        enabled: true
      collectors: {alloy: {preset: "metrics-collector"}}
    asserts:
      - failedTemplate:
          errorMessage: |-
            No destinations found that can accept metrics from the Annotation Autodiscovery feature.
            Please add a destination with metrics support.
            See https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/destinations/README.md for more details.

  - it: requires a collector
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prom:
          type: prometheus
          url: http://prom.prom.svc:9090/api/v1/write
      annotationAutodiscovery:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: |-
            At least one collector should be enabled
            Please enable one by setting:
            collectors:
              <collector-name>:
                <collector-settings>
            See https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/docs/collectors/README.md for more details.

  - it: requires one of the two types to be enabled
    template: validations.yaml
    set:
      cluster:
        name: ci-test-cluster
      destinations:
        prom:
          type: prometheus
          url: http://prom.prom.svc:9090/api/v1/write
      annotationAutodiscovery:
        enabled: true
        pods:
          enabled: false
        services:
          enabled: false
      collectors: {alloy-metrics: {}}
    asserts:
      - failedTemplate:
          errorMessage: |-
            Either Pods or Services must be enabled for this feature to work.
            Please enable one or both:
            annotationAutodiscovery:
              pods:
                enabled: true
              services:
                enabled: true
