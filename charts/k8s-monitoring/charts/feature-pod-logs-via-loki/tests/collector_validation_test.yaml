# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Pod Logs via Loki - Collector validation
templates:
  - test/configmap.yaml
tests:
  - it: should fail if not a daemonset
    set:
      testing:
        enabled: true
        Collector:
          controller:
            type: deployment
    asserts:
      - failedTemplate:
          errorMessage: |-
            Pod Logs feature requires Alloy to be a DaemonSet.
            Please set:
            collectors:
              alloy-test:
                presets: [daemonset]
            OR
            collectors:
              alloy-test:
                controller:
                  type: daemonset

  - it: should fail if /var/log is not mounted
    set:
      testing:
        enabled: true
        Collector:
          alloy:
            mounts:
              varlog: false
          controller:
            type: daemonset
    asserts:
      - failedTemplate:
          errorMessage: |-
            Pod Logs feature requires Alloy to mount /var/log.
            Please set:
            collectors:
              alloy-test:
                presets: [filesystem-log-reader]
            OR
            collectors:
              alloy-test:
                alloy:
                  mounts:
                    varlog: true

  - it: should fail if using secretFilter and not public-preview stability level
    set:
      secretFilter:
        enabled: true
      testing:
        enabled: true
        Collector:
          alloy:
            stabilityLevel: stable
            clustering:
              enabled: false
            mounts:
              varlog: true
          controller:
            type: daemonset
    asserts:
      - failedTemplate:
          errorMessage: |-
            Pod Logs feature requires Alloy to use the experimental stability level when using the secretFilter.
            Please set:
            collectors:
              alloy-test:
                alloy:
                  stabilityLevel: experimental
