---
# The fields in this global section are populated by the parent k8s-monitoring chart's global settings.
# To change any of these values, set them at the top level of the parent chart's values.yaml under
# `global:`, not here under `integrations.global:`.
global:
  # -- Override the namespace for namespaced resources created by this chart.
  # @section -- Global Settings
  namespaceOverride: ""

  # -- How frequently to scrape metrics.
  # @section -- Global Settings
  scrapeInterval: 60s

  # -- The timeout for scraping metrics.
  # @section -- Global Settings
  scrapeTimeout: 10s

  # -- The protocols to negotiate during a Prometheus metrics scrape, in order of preference.
  # @section -- Global Settings
  scrapeProtocols: ["OpenMetricsText1.0.0", "OpenMetricsText0.0.1", "PrometheusText0.0.4"]

  # -- Whether to scrape a classic histogram that’s also exposed as a native histogram.
  # @section -- Global Settings
  scrapeClassicHistograms: false

  # -- Whether to scrape native histograms.
  # @section -- Global Settings
  scrapeNativeHistograms: false

  # -- Whether to convert classic histograms to native histograms with custom buckets (NHCB) at scrape time.
  # @section -- Global Settings
  convertClassicHistogramsToNhcb: false

  # -- Sets the max_cache_size for every prometheus.relabel component. ([docs](https://grafana.com/docs/alloy/latest/reference/components/prometheus/prometheus.relabel/#arguments))
  # This should be at least 2x-5x your largest scrape target or samples appended rate.
  # @section -- Global Settings
  maxCacheSize: 100000

# Configures which node labels to attach to the metrics collected for integrations that perform service discovery
nodeLabels:
  # -- Whether or not to attach the nodepool label
  # @section -- Node Labels
  nodePool: false
  # -- Whether or not to add the region label
  # @section -- Node Labels
  region: false
  # -- Whether or not to add the availability\_zone label
  # @section -- Node Labels
  availabilityZone: false
  # -- Whether or not to add the node\_role label
  # @section -- Node Labels
  nodeRole: false
  # -- Whether or not to add the os label
  # @section -- Node Labels
  nodeOS: false
  # -- Whether or not to add the node architecture label
  # @section -- Node Labels
  nodeArchitecture: false
  # -- Whether or not to add the instance\_type label
  # @section -- Node Labels
  instanceType: false

# -- Scrape metrics/logs from Grafana Alloy
# @section -- Integration: Alloy
alloy:
  # -- Rule blocks to be added to the discovery.relabel component for every discovered target of this integration.
  # Applied pre-scrape against targets from Kubernetes service discovery, so all `__meta*` labels are present (e.g. `labelmap` from pod annotations).
  # ([docs](https://grafana.com/docs/alloy/latest/reference/components/discovery/discovery.relabel/#rule-block))
  # @section -- Integration: Alloy
  extraDiscoveryRules: ""
  instances: []

