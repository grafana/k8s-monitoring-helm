# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Integration - cert-manager - Metrics
templates:
  - test/configmap.yaml
tests:
  - it: should create the cert-manager config
    set:
      testing: {enabled: true}
      cert-manager:
        instances:
          - name: cert-manager
            labelSelectors:
              app.kubernetes.io/name: cert-manager
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["metrics.alloy"]

  - it: should append extraDiscoveryRules to the discovery.relabel
    set:
      testing: {enabled: true}
      cert-manager:
        instances:
          - name: cert-manager
            labelSelectors:
              app.kubernetes.io/name: cert-manager
            extraDiscoveryRules: |-
              rule {
                action = "labelmap"
                regex  = "__meta_kubernetes_pod_annotation_resource_opentelemetry_io_(.*)"
              }
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["metrics.alloy"]
          pattern: |-
            \s*  rule \{
            \s*    action = "labelmap"
            \s*    regex  = "__meta_kubernetes_pod_annotation_resource_opentelemetry_io_\(\.\*\)"
            \s*  \}

  - it: can be restricted to a namespace
    set:
      testing: {enabled: true}
      cert-manager:
        instances:
          - name: my-cert-manager
            labelSelectors:
              app.kubernetes.io/name: my-cert-manager
            namespaces:
              - kube-system
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["metrics.alloy"]
