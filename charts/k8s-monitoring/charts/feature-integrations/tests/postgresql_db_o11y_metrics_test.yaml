# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Integration - PostgreSQL - Database Observability Metrics
templates:
  - test/configmap.yaml
  - postgresql-secret.yaml
tests:
  - it: should create the PostgreSQL config
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: my-database
            exporter:
              dataSource:
                host: my-db.postgresql.svc
                auth:
                  username: db-admin
                  password: db-password
            databaseObservability:
              enabled: true
            logs: {enabled: false}
    asserts:
      - template: test/configmap.yaml
        matchSnapshot:
          path: data["metrics.alloy"]

      - template: postgresql-secret.yaml
        documentIndex: 0
        containsDocument:
          apiVersion: v1
          kind: Secret
          name: my-database-release-name-feature-integrations
          namespace: NAMESPACE
      - template: postgresql-secret.yaml
        equal:
          path: stringData.username
          value: db-admin
      - template: postgresql-secret.yaml
        equal:
          path: stringData.password
          value: db-password

  - it: works with multiple PostgreSQL Instances
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: test-db
            exporter:
              dataSource:
                host: database.test.svc
            databaseObservability:
              enabled: true
            logs: {enabled: false}
          - name: staging-db
            exporter:
              dataSourceName: "root:password@database.staging.svc:3306/"
            databaseObservability:
              enabled: true
            logs: {enabled: false}
          - name: prod-db
            exporter:
              dataSource:
                host: database.prod.svc
                auth:
                  username: db-admin
                  password: db-password
            databaseObservability:
              enabled: true
            logs: {enabled: false}
    asserts:
      - template: test/configmap.yaml
        matchSnapshot:
          path: data["metrics.alloy"]

      - template: postgresql-secret.yaml
        hasDocuments:
          count: 1  # Only one secret should be created
      - template: postgresql-secret.yaml
        documentIndex: 0
        containsDocument:
          apiVersion: v1
          kind: Secret
          name: prod-db-release-name-feature-integrations
          namespace: NAMESPACE
      - template: postgresql-secret.yaml
        equal:
          path: stringData.username
          value: db-admin
      - template: postgresql-secret.yaml
        equal:
          path: stringData.password
          value: db-password

  - it: renders new db o11y options (azure, exclude_databases, exclude_current_user)
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: azure-db
            exporter:
              dataSource:
                host: azure-db.postgresql.svc
                auth:
                  username: db-admin
                  password: db-password
            databaseObservability:
              enabled: true
              excludeDatabases: ["employees", "departments"]
              cloudProvider:
                azure:
                  subscriptionId: "sub-123"
                  resourceGroup: "rg-prod"
                  serverName: "my-azure-server"
              collectors:
                querySamples:
                  enabled: true
                  collectInterval: 1m
                  disableQueryRedaction: false
                  excludeCurrentUser: false
            logs: {enabled: false}
    asserts:
      - template: test/configmap.yaml
        matchSnapshot:
          path: data["metrics.alloy"]

  - it: renders new db o11y options (exclude_users)
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: new-opts-db
            exporter:
              dataSource:
                host: new-opts-db.postgresql.svc
                auth:
                  username: db-admin
                  password: db-password
            databaseObservability:
              enabled: true
              excludeUsers: ["monitoring_user"]
            logs: {enabled: false}
    asserts:
      - template: test/configmap.yaml
        matchSnapshot:
          path: data["metrics.alloy"]

  - it: renders new db o11y options (statements_limit)
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: limited-db
            exporter:
              dataSource:
                host: limited-db.postgresql.svc
                auth:
                  username: db-admin
                  password: db-password
            databaseObservability:
              enabled: true
              collectors:
                queryDetails:
                  enabled: true
                  statementsLimit: 50
            logs: {enabled: false}
    asserts:
      - template: test/configmap.yaml
        matchSnapshot:
          path: data["metrics.alloy"]

  - it: requires metrics
    set:
      testing: {enabled: true}
      postgresql:
        instances:
          - name: test-database
            metrics: {enabled: false}
            logs: {enabled: false}
            databaseObservability:
              enabled: true
    asserts:
      - template: test/configmap.yaml
        failedTemplate:
          errorMessage: |-
            Enabling Database Observability for PostgreSQL requires exporter metrics.
            Please set:
            integrations:
              postgresql:
                instances:
                  - name: test-database
                    metrics:
                      enabled: true
