# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Cluster Events - Labels
templates:
  - test/configmap.yaml
tests:
  - it: should create a ConfigMap that sets custom labels from extracted fields
    set:
      testing: {enabled: true}
      labels:
        node: node
        reason: reason
        component: component
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
