# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Node Logs - labels
templates:
  - test/configmap.yaml
tests:
  - it: should create a ConfigMap that sets custom journal labels
    set:
      testing: {enabled: true}
      journalLabels:
        exe: exe
        hostname: hostname
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
