{{- if .Values.testing }}
{{- if .Values.testing.enabled }}
{{- $context := dict "Values" .Values "Files" .Files "Release" .Release "telemetryServices" .Values.testing.telemetryServices }}
{{- include "feature.nodeLogs.validate" $context }}
{{- if .Values.testing.Collector }}
  {{ include "feature.nodeLogs.collector.validate" (dict "Values" .Values "Collector" .Values.testing.Collector "CollectorName" "alloy-test" )}}
{{- end }}
{{- $alloyConfig := include "feature.nodeLogs.module" $context }}
{{- $alloyConfig = regexReplaceAll `[ \t]+(\r?\n)` $alloyConfig "\n" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-test-config
  namespace: {{ include "helper.namespace" . }}
data:
  module.alloy: |-
    {{- $alloyConfig | trim | nindent 4 }}
{{- end }}
{{- end }}
