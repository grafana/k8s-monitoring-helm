# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Pod Logs - Gather Method - OpenTelemetry Filelog Receiver
templates:
  - test/configmap.yaml
tests:
  - it: should render using the filelog receiver
    set:
      testing: {enabled: true}
      gatherMethod: filelog
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: can utilize the otel annotations flag
    set:
      testing: {enabled: true}
      gatherMethod: filelog
      otelAnnotations: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
