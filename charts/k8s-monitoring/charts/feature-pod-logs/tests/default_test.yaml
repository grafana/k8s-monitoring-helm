# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Pod Logs - Default Values
templates:
  - test/configmap.yaml
tests:
  - it: should render the default configuration
    set:
      testing: {enabled: true}
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow overriding the default labelsToKeep
    set:
      testing: {enabled: true}
      labelsToKeep:
        - k8s_container_name
        - k8s_namespace
        - k8s_pod_name
        - k8s_pod_label_app_kubernetes_io_name
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow setting structured metadata
    set:
      testing: {enabled: true}
      structuredMetadata:
        caller: caller
        component: component
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow setting static labels
    set:
      testing: {enabled: true}
      staticLabels:
        region: central
      staticLabelsFrom:
        color: sys.env("COLOR")
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow using the secret filter
    set:
      testing: {enabled: true}
      secretFilter:
        enabled: true
        partialMask: 3
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow using the secret filter with an allowlist
    set:
      testing: {enabled: true}
      secretFilter:
        enabled: true
        partialMask: 3
        allowlist:
          - ".*secret.*"
          - ".*token.*"
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow using the secret filter with a gitleaks config and other settings
    set:
      testing: {enabled: true}
      secretFilter:
        enabled: true
        gitleaksConfigPath: "/var/log/gitleaks.toml"
        redactWith: "<ALLOY-REDACTED-SECRET:$SECRET_NAME:$SECRET_HASH>"
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow using the secret filter with an inclusion filter, to split which logs are filtered
    set:
      testing: {enabled: true}
      secretFilter:
        enabled: true
        inclusionSelector: '{app=="payment-processor"}'
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: should allow using label selectors
    set:
      testing: {enabled: true}
      labelSelectors:
        app: myapp
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
  - it: should allow using label selectors with multiple values
    set:
      testing: {enabled: true}
      labelSelectors:
        color: [blue, green]
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
