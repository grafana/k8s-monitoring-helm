# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Application Observability - Spanlogs connector
templates:
  - test/configmap.yaml
tests:
  - it: creates the pipeline with the spanlogs connector
    set:
      testing: {enabled: true}
      connectors:
        spanLogs:
          enabled: true
          spans: true
      receivers:
        otlp:
          grpc:
            enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
