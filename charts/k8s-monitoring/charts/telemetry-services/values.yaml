---
global:
  # -- The specific platform for this cluster. Will enable compatibility for some platforms. Supported options: (empty) or "openshift".
  # @section -- Global Settings
  platform: ""

## Node Exporter gathers hardware information about Linux nodes.
node-exporter:
  # -- Deploy Node Exporter. Set to false if your cluster already has Node Exporter deployed.
  # @section -- Node Exporter
  deploy: true

  # -- Check for an existing Node Exporter using the same port before deploying.
  # If a conflict is detected, the install fails with guidance to use the existing Node Exporter or pick a unique
  # port. Set to false to skip the check.
  # @section -- Node Exporter
  portConflictCheck: true

  # @ignored
  extraArgs:
    # Defaults (https://github.com/prometheus/node_exporter/blob/master/collector/filesystem_linux.go#L38) + tmpfs,ramfs
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|erofs|sysfs|tracefs|tmpfs|ramfs)$

  # Disable the prometheus.io/scrape annotation
  # @ignored
  service:
    annotations:
      prometheus.io/scrape: "false"

  # @ignored
  nodeSelector:
    kubernetes.io/os: linux

  # @ignored
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values: [fargate]

  # @ignored - Enable the release label
  releaseLabel: true

  # @ignored
  podAnnotations:
    k8s.grafana.com/logs.job: integrations/node_exporter

# Windows Exporter gathers hardware information about Windows nodes.
windows-exporter:
  # -- Deploy Windows Exporter. Set to false if your cluster already has Windows Exporter deployed.
  # @section -- Windows Exporter - Deployment settings
  deploy: true

  # -- Windows Exporter configuration
  # @ignored
  config: |-
    collectors:
      enabled: cpu,container,logical_disk,memory,net,os
    collector:
      service:
        include: "containerd|kubelet"

  # @ignored - Enable the release label
  releaseLabel: true

  # @ignored - Set annotation to override the job label
  podAnnotations:
    k8s.grafana.com/logs.job: integrations/windows_exporter

# kube-state-metrics gathers information about Kubernetes resources.
kube-state-metrics:
  # -- Deploy kube-state-metrics. Set to false if your cluster already has kube-state-metrics deployed.
  # @section -- kube-state-metrics
  deploy: false

  # -- `kube_<resource>_labels` metrics to generate.
  # The default is to include a useful set for Node labels.
  # @section -- kube-state-metrics
  metricLabelsAllowlist:
    - nodes=[agentpool,alpha.eksctl.io/cluster-name,alpha.eksctl.io/nodegroup-name,beta.kubernetes.io/instance-type,cloud.google.com/gke-nodepool,cluster-name,ec2.amazonaws.com/Name,ec2.amazonaws.com/aws-autoscaling-groupName,ec2.amazonaws.com/aws-autoscaling-group-name,ec2.amazonaws.com/name,eks.amazonaws.com/nodegroup,k8s.io/cloud-provider-aws,karpenter.sh/nodepool,kubernetes.azure.com/cluster,kubernetes.io/arch,kubernetes.io/hostname,kubernetes.io/os,node.kubernetes.io/instance-type,topology.kubernetes.io/region,topology.kubernetes.io/zone]

  # @ignored
  nodeSelector:
    kubernetes.io/os: linux

  # @ignored
  podAnnotations:
    k8s.grafana.com/logs.job: integrations/kubernetes/kube-state-metrics

  # @ignored - Enable the release label
  releaseLabel: true

  # @ignored - Disable autosharding
  autosharding:
    enabled: false

  # @ignored - Recreate on update, eliminates the potential for duplicate metrics
  updateStrategy: Recreate

  # @ignored - Disable prometheus.io/scrape annotation
  prometheusScrape: false

# Kepler gathers energy metrics for the Kubernetes Cluster and the objects running inside.
kepler:
  # -- Deploy Kepler.
  # @section -- Kepler
  deploy: false

  # @ignored -- Don't mount /usr/src
  canMount:
    usrSrc: false
  # @ignored -- Include idle power metric estimation.
  extraEnvVars:
    EXPOSE_ESTIMATED_IDLE_POWER_METRICS: "true"
  # @ignored -- Do not deploy Kepler on EKS Fargate nodes
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values: [fargate]
  # @ignored
  podAnnotations:
    k8s.grafana.com/logs.job: integrations/kepler

# OpenCost gathers cost metrics for the Kubernetes Cluster and the objects running inside.
opencost:
  # -- Deploy OpenCost.
  # @section -- OpenCost
  deploy: false

  # -- The name of the metric destination where OpenCost will query for required metrics. Setting this will enable
  # guided setup for required OpenCost parameters. To skip guided setup, set this to "custom".
  # @section -- OpenCost
  metricsSource: ""

  # -- On GCP/GKE, OpenCost's GCP provider writes ${CONFIG_PATH}/gcp.json on startup. CONFIG_PATH
  # defaults to /var/configs, which is not writable by the non-root container user, causing the
  # pod to panic. Mount an emptyDir there so the default path is writable. This is preferred over
  # setting CONFIG_PATH via extraEnv, which collides with the CONFIG_PATH the OpenCost chart sets
  # when customPricing is enabled (duplicate env var). The upstream chart only mounts at
  # /var/configs when cloud integration is enabled, so this does not conflict by default.
  # @section -- OpenCost
  extraVolumes:
    - name: configs
      emptyDir: {}

  opencost:
    # @ignored -- This skips including these values in README.md
    exporter:
      # -- Default cluster ID to use if cluster is not set in Prometheus metrics. It should match cluster.name.
      # @section -- OpenCost
      defaultClusterId: "default-cluster"

      extraEnv:
        # CLOUD_PROVIDER_API_KEY must be non-empty so OpenCost's NewProvider() does not refuse
        # to construct the GCP provider on GKE; the value itself is unused (pricing falls back
        # to defaults).
        CLOUD_PROVIDER_API_KEY: disabled
        CURRENT_CLUSTER_ID_FILTER_ENABLED: "true"
        PROM_CLUSTER_ID_LABEL: cluster

      extraVolumeMounts:
        - mountPath: /var/configs
          name: configs
          readOnly: false

    # @ignored -- This skips including these values in README.md
    carbonCost:
      enabled: false

    # @ignored -- This skips including these values in README.md
    cloudCost:
      enabled: false

    # @ignored -- This skips including these values in README.md
    mcp:
      enabled: false

    # @ignored -- This skips including these values in README.md
    metrics:
      kubeStateMetrics:
        emitKsmV1Metrics: false
        emitKsmV1MetricsOnly: true

    prometheus:
      # -- The name of the secret containing the username and password for the metrics service. This must be in the same namespace as the OpenCost deployment.
      # @section -- OpenCost
      existingSecretName: ""
      # -- The key for the username property in the secret.
      # @section -- OpenCost
      username_key: username
      # -- The key for the password property in the secret.
      # @section -- OpenCost
      password_key: password
      external:
        # @ignored -- This skips including these values in README.md
        enabled: true
        # -- The URL where OpenCost queries for the metrics it needs. Required when `metricsSource` is set to a metrics
        # destination: the guided setup fails the install with the exact URL to use if this is left empty. It should
        # point at the query endpoint of the destination named by `metricsSource` (e.g. that destination's URL with the
        # remote-write path replaced by the query path, such as `/api/prom` or `/api/v1/query`).
        # @section -- OpenCost
        url: ""
      # @ignored -- This skips including these values in README.md
      internal:
        enabled: false
    # @ignored -- This skips including these values in README.md
    ui:
      enabled: false
    # @ignored -- This skips including these values in README.md
    nodeSelector:
      kubernetes.io/os: linux

    # @ignored -- This skips including these values in README.md
    tolerations:
      - key: kubernetes.io/arch
        operator: Equal
        value: arm64
        effect: NoSchedule

# k8s-manifest-tail watches and logs Kubernetes manifest changes.
k8s-manifest-tail:
  # -- Deploy k8s-manifest-tail to watch and log Kubernetes manifest changes.
  # @section -- k8s-manifest-tail
  deploy: false

  # @ignored
  podAnnotations:
    logs.grafana.com/pods.enabled: "false"

  # -- Extra environment variables, required for setting the OTLP destination for the manifests.
  # @section -- k8s-manifest-tail
  extraEnv: []
  #  - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
  #    value: http://k8smon-alloy-receiver.default.svc:4317
  #  - name: OTEL_EXPORTER_OTLP_LOGS_PROTOCOL
  #    value: grpc

# Beyla, only used for its Kubernetes metadata cache for now.
beyla:
  # -- Deploy Grafana Beyla's services. This controls *all* systems from the Grafana Beyla Helm chart: Beyla itself, and
  # the Beyla Kubernetes metadata cache.
  # @section -- Beyla
  deploy: false

  # -- Enable Grafana Beyla. This should remain off until we remove Beyla from the autoInstrumentation feature.
  # @section -- Beyla
  enabled: false

  # @ignored - Prevent Beyla from creating a ConfigMap
  config:
    skipConfigMapCheck: true
    create: false

  # -- Options for the Grafana Beyla Kubernetes metadata cache.
  # @section -- Beyla
  k8sCache:
    replicas: 0

# SDK Injector deploys the Grafana Kubernetes Injection Controller for Beyla SDK auto-instrumentation.
# To see all valid settings, run `helm show values grafana/k8s-injection-controller`.
# @default -- Disabled
# @section -- SDK Injector
sdkInjector:
  # SDK Injector deploys the Grafana Kubernetes Injection Controller for Beyla SDK auto-instrumentation.
  # To see all valid settings, run `helm show values grafana/k8s-injection-controller`.
  # @section -- SDK Injector
  deploy: false

  # -- Set a proper name to avoid RELEASE-NAME-sdkInjector
  # @ignored
  nameOverride: k8s-injection-controller

  # @ignored - Utilize the release namespace
  namespace:
    name: ""
    create: false

  # -- Comma-separated allowlist of usernames permitted to create or update annotated injection ConfigMaps. By default,
  # Kubernetes expands `$(POD_NAMESPACE)` to the namespace where the SDK Injector pod is running.
  # @section -- SDK Injector
  allowedConfigMapWriters: ""
