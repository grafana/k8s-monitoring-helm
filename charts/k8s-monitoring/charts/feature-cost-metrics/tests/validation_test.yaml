# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Cost Metrics - Validation
templates:
  - test/configmap.yaml
tests:
  - it: should fail when OpenCost does not specify OpenCost selectors
    set:
      testing: {enabled: true}
    asserts:
      - failedTemplate:
          errorMessage: |-
            The OpenCost configuration requires a connection to OpenCost
            Please enable the built-in deployment:
            telemetryServices:
              opencost:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing OpenCost:
            costMetrics:
              opencost:
                labelMatchers:
                  app.kubernetes.io/name: opencost
                namespace: opencost-namespace

  - it: should fail when OpenCost sets only a namespace without label matchers
    set:
      testing: {enabled: true}
      opencost:
        namespace: opencost-namespace
    asserts:
      - failedTemplate:
          errorMessage: |-
            The OpenCost configuration requires a connection to OpenCost
            Please enable the built-in deployment:
            telemetryServices:
              opencost:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing OpenCost:
            costMetrics:
              opencost:
                labelMatchers:
                  app.kubernetes.io/name: opencost
                namespace: opencost-namespace
