# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Cost Metrics - Validation
templates:
  - test/configmap.yaml
tests:
  - it: should fail when OpenCost does not specify OpenCost selectors
    set:
      testing: {enabled: true}
    asserts:
      - failedTemplate:
          errorMessage: |-
            The OpenCost configuration requires a connection to OpenCost
            Please enable the built-in deployment:
            telemetryServices:
              opencost:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing OpenCost:
            costMetrics:
              opencost:
                labelMatchers:
                  app.kubernetes.io/name: opencost
                namespace: opencost-namespace

  - it: should fail when no pods match the configured OpenCost label matchers in the namespace
    set:
      testing: {enabled: true}
      opencost:
        namespace: opencost-namespace
        labelMatchers:
          app.kubernetes.io/name: opencost
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: some-other-workload
            namespace: opencost-namespace
            labels:
              app.kubernetes.io/name: something-else
    asserts:
      - failedTemplate:
          errorMessage: |-
            Unable to find any OpenCost pods matching the configured labelMatchers in namespace "opencost-namespace".
            The configured labelMatchers were:
              app.kubernetes.io/name: opencost

            Please verify the namespace and labelMatchers point to a running OpenCost.

  - it: should pass when a pod matches the configured OpenCost label matchers in the namespace
    set:
      testing: {enabled: true}
      opencost:
        namespace: opencost-namespace
        labelMatchers:
          app.kubernetes.io/name: opencost
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: opencost-abcde
            namespace: opencost-namespace
            labels:
              app.kubernetes.io/name: opencost
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["module.alloy"]
          pattern: 'label = "app.kubernetes.io/name=opencost"'

  - it: should fail when OpenCost sets only a namespace without label matchers
    set:
      testing: {enabled: true}
      opencost:
        namespace: opencost-namespace
    asserts:
      - failedTemplate:
          errorMessage: |-
            The OpenCost configuration requires a connection to OpenCost
            Please enable the built-in deployment:
            telemetryServices:
              opencost:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing OpenCost:
            costMetrics:
              opencost:
                labelMatchers:
                  app.kubernetes.io/name: opencost
                namespace: opencost-namespace
