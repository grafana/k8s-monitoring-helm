# yamllint disable rule:document-start rule:line-length rule:trailing-spaces
suite: Feature - Kubernetes Manifests - Default values
templates:
  - test/configmap.yaml
tests:
  - it: should create a ConfigMap
    set:
      testing: {enabled: true}
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]
