---
namespaces: []

refreshInterval: 3600

kinds:
  pods:
    gather: true
  deployments:
    gather: true
  statefulsets:
    gather: true
  daemonsets:
    gather: true
  cronjobs:
    gather: true

# The image to run to get the Kubernetes manifests from this cluster. It must contain
# `kubectl` and `jq` at a minimum.
# @section -- Image
image:
  registry: ghcr.io
  repository: grafana/helm-chart-toolbox-kubectl
  tag: 0.1.3
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# @ignore
deployAsConfigMap: false
