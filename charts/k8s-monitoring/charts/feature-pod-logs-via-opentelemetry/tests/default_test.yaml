# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Pod Logs via OpenTelemetry - Default Values
templates:
  - test/configmap.yaml
tests:
  - it: should render the default configuration
    set:
      testing: {enabled: true}
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: can utilize the otel annotations flag
    set:
      testing: {enabled: true}
      otelAnnotations: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: should allow setting log attributes
    set:
      testing: {enabled: true}
      logAttributes:
        caller: caller
        component: component
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: should allow setting resource attributes
    set:
      testing: {enabled: true}
      resourceAttributes:
        region: central
      resourceAttributesFrom:
        color: sys.env("COLOR")
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: should allow using label selectors
    set:
      testing: {enabled: true}
      labelSelectors:
        app: myapp
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: should allow using label selectors with multiple values
    set:
      testing: {enabled: true}
      labelSelectors:
        color: [blue, green]
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data["module.alloy"]

  - it: reads the app label fallback from the configured label attribute
    set:
      testing: {enabled: true}
      labels:
        app_kubernetes_io_name: app.kubernetes.io/instance
        my_app: app.kubernetes.io/name
    asserts:
      - matchRegex:
          path: data["module.alloy"]
          pattern: '`set\(attributes\["service\.name"\], attributes\["my_app"\]\) where \(attributes\["service\.name"\] == nil or attributes\["service\.name"\] == ""\) and attributes\["my_app"\] != nil and attributes\["my_app"\] != ""`'

  - it: omits the app label fallback when no label maps to app.kubernetes.io/name
    set:
      testing: {enabled: true}
      labels:
        app_kubernetes_io_name: app.kubernetes.io/instance
    asserts:
      - notMatchRegex:
          path: data["module.alloy"]
          pattern: 'set\(attributes\["service\.name"\], attributes\["app'
      - matchRegex:
          path: data["module.alloy"]
          pattern: '(?s)delete_key\(attributes, "logs\.grafana\.com/pods\.enabled"\)`,\s+`set\(attributes\["service\.name"\], attributes\["k8s\.deployment\.name"\]\)'

  - it: does not fall back to replicaset or container names
    set:
      testing: {enabled: true}
    asserts:
      - notMatchRegex:
          path: data["module.alloy"]
          pattern: 'set\(attributes\["service\.name"\], attributes\["k8s\.replicaset\.name"\]\)'
      - notMatchRegex:
          path: data["module.alloy"]
          pattern: 'set\(attributes\["service\.name"\], attributes\["k8s\.container\.name"\]\)'
      - matchRegex:
          path: data["module.alloy"]
          pattern: '`set\(attributes\["service\.name"\], attributes\["app_kubernetes_io_name"\]\) where \(attributes\["service\.name"\] == nil or attributes\["service\.name"\] == ""\) and attributes\["app_kubernetes_io_name"\] != nil and attributes\["app_kubernetes_io_name"\] != ""`'
