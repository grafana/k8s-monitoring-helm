# yamllint disable rule:document-start rule:line-length rule:trailing-spaces rule:empty-lines
suite: Feature - Host Metrics - Validation
templates:
  - test/configmap.yaml
tests:
  - it: should fail when Linux hosts do not specify Node Exporter selectors
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: |-
            The Linux host configuration requires a connection to Node Exporter
            Please enable the built-in deployment:
            telemetryServices:
              node-exporter:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing Node Exporter:
            hostMetrics:
              linuxHosts:
                labelMatchers:
                  app.kubernetes.io/name: prometheus-node-exporter
                namespace: node-exporter-namespace

  - it: should fail when Linux hosts set only a namespace without label matchers
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
        namespace: node-exporter-namespace
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: |-
            The Linux host configuration requires a connection to Node Exporter
            Please enable the built-in deployment:
            telemetryServices:
              node-exporter:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing Node Exporter:
            hostMetrics:
              linuxHosts:
                labelMatchers:
                  app.kubernetes.io/name: prometheus-node-exporter
                namespace: node-exporter-namespace

  - it: should fail when no pods match the configured Node Exporter label matchers in the namespace
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
        namespace: node-exporter-namespace
        labelMatchers:
          app.kubernetes.io/name: prometheus-node-exporter
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: some-other-workload
            namespace: node-exporter-namespace
            labels:
              app.kubernetes.io/name: something-else
    asserts:
      - failedTemplate:
          errorMessage: |-
            Unable to find any Node Exporter pods matching the configured labelMatchers in namespace "node-exporter-namespace".
            The configured labelMatchers were:
              app.kubernetes.io/name: prometheus-node-exporter

            Please verify the namespace and labelMatchers point to a running Node Exporter.

  - it: should pass when a pod matches the configured Node Exporter label matchers in the namespace
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
        namespace: node-exporter-namespace
        labelMatchers:
          app.kubernetes.io/name: prometheus-node-exporter
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: prometheus-node-exporter-abcde
            namespace: node-exporter-namespace
            labels:
              app.kubernetes.io/name: prometheus-node-exporter
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["module.alloy"]
          pattern: 'label = "app.kubernetes.io/name=prometheus-node-exporter"'

  - it: should fail when a pod matches only some of the configured Node Exporter label matchers
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
        namespace: node-exporter-namespace
        labelMatchers:
          app.kubernetes.io/name: prometheus-node-exporter
          app.kubernetes.io/instance: my-release
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: prometheus-node-exporter-abcde
            namespace: node-exporter-namespace
            labels:
              app.kubernetes.io/name: prometheus-node-exporter
              app.kubernetes.io/instance: a-different-release
    asserts:
      - failedTemplate:
          errorMessage: |-
            Unable to find any Node Exporter pods matching the configured labelMatchers in namespace "node-exporter-namespace".
            The configured labelMatchers were:
              app.kubernetes.io/instance: my-release
              app.kubernetes.io/name: prometheus-node-exporter

            Please verify the namespace and labelMatchers point to a running Node Exporter.

  - it: should skip the pod lookup check when the namespace has no pods (best-effort, e.g. helm template)
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: true
        namespace: node-exporter-namespace
        labelMatchers:
          app.kubernetes.io/name: prometheus-node-exporter
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    asserts:
      - isKind:
          of: ConfigMap

  - it: should skip the pod lookup check when Node Exporter is deployed by telemetryServices
    set:
      testing:
        enabled: true
        telemetryServices:
          node-exporter:
            deploy: true
      linuxHosts:
        enabled: true
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    kubernetesProvider:
      scheme:
        "v1/Pod":
          gvr:
            version: v1
            resource: pods
          namespaced: true
      objects:
        - kind: Pod
          apiVersion: v1
          metadata:
            name: some-other-workload
            namespace: NAMESPACE
            labels:
              app.kubernetes.io/name: something-else
    asserts:
      - isKind:
          of: ConfigMap

  - it: should fail when Windows hosts do not specify Windows Exporter selectors
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: false
      energyMetrics:
        enabled: false
      windowsHosts:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: |-
            The Windows host configuration requires a connection to Windows Exporter
            Please enable the built-in deployment:
            telemetryServices:
              windows-exporter:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing Windows Exporter:
            hostMetrics:
              windowsHosts:
                labelMatchers:
                  app.kubernetes.io/name: prometheus-windows-exporter
                namespace: windows-exporter-namespace

  - it: should fail when host energy metrics do not specify Kepler selectors
    set:
      testing: {enabled: true}
      linuxHosts:
        enabled: false
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: |-
            The host energy metrics configuration requires a connection to Kepler
            Please enable the built-in deployment:
            telemetryServices:
              kepler:
                deploy: true
            Or, set the label matchers (and optionally a namespace) for an existing Kepler:
            hostMetrics:
              energyMetrics:
                labelMatchers:
                  app.kubernetes.io/name: kepler
                namespace: kepler-namespace

  - it: should fail when deployment-level setting is under hostMetrics.linuxHosts
    set:
      testing:
        enabled: true
        telemetryServices:
          node-exporter:
            deploy: true
      linuxHosts:
        enabled: true
        extraArgs:
          - --collector.filesystem.fs-types-exclude=^tmpfs$
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: |-
            The key "extraArgs" found under hostMetrics.linuxHosts is a deployment-level setting.
            In v4.x, deployment settings for Node Exporter have moved to telemetryServices.
            Please move this setting:
            telemetryServices:
              node-exporter:
                extraArgs: ...

  - it: should fail when deployment-level setting is under hostMetrics.windowsHosts
    set:
      testing:
        enabled: true
        telemetryServices:
          windows-exporter:
            deploy: true
      linuxHosts:
        enabled: false
      windowsHosts:
        enabled: true
        resources:
          limits:
            cpu: 100m
      energyMetrics:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: |-
            The key "resources" found under hostMetrics.windowsHosts is a deployment-level setting.
            In v4.x, deployment settings for Windows Exporter have moved to telemetryServices.
            Please move this setting:
            telemetryServices:
              windows-exporter:
                resources: ...

  - it: should fail when deployment-level setting is under hostMetrics.energyMetrics
    set:
      testing:
        enabled: true
        telemetryServices:
          kepler:
            deploy: true
      linuxHosts:
        enabled: false
      windowsHosts:
        enabled: false
      energyMetrics:
        enabled: true
        tolerations:
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
    asserts:
      - failedTemplate:
          errorMessage: |-
            The key "tolerations" found under hostMetrics.energyMetrics is a deployment-level setting.
            In v4.x, deployment settings for Kepler have moved to telemetryServices.
            Please move this setting:
            telemetryServices:
              kepler:
                tolerations: ...
