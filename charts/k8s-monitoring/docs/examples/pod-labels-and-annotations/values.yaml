---
cluster:
  name: pod-labels-and-annotations

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push
  tempo:
    type: otlp
    url: http://tempo.tempo.svc
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  kube-state-metrics:
    metricsTuning:
      includeMetrics:
        - kube_pod_annotations
        - kube_pod_labels

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  labels:       # Capture the `example.com/name` Pod label as the `name` log label
    name: example.com/name
  annotations:  # Capture the `example.com/environment` Pod annotation as the `environment` log label
    environment: example.com/environment

applicationObservability:
  enabled: true
  collector: alloy-receiver
  processors:
    k8sattributes:
      labels:
        - from: pod
          key_regex: "kubernetes.io/(.*)"
          tag_name: "$1"
  receivers:
    otlp:
      grpc:
        enabled: true

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
  alloy-receiver:
    presets: [deployment]

telemetryServices:
  kube-state-metrics:
    deploy: true
    metricLabelsAllowlist:  # Configures kube-state-metrics to capture Pod labels as kube_pod_labels metrics
      - pods=[*]
    metricAnnotationsAllowList:  # Configures kube-state-metrics to capture Pod annotations as kube_pod_annotations metrics
      - pods=[*]
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
