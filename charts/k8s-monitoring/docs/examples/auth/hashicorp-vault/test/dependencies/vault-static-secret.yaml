---
# VaultStaticSecret syncs secrets from Vault into a Kubernetes Secret.
# The Vault Secrets Operator watches this resource and creates/updates
# the target Kubernetes Secret with the values from Vault.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: monitoring-credentials
  namespace: default
spec:
  type: kv-v2
  mount: secret
  path: monitoring
  refreshAfter: 60s
  destination:
    name: monitoring-credentials
    create: true
    type: Opaque
