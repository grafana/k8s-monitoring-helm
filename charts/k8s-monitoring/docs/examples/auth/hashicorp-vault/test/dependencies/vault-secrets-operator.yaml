---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: vault
spec:
  interval: 1m
  dependsOn:
    - name: vault
      namespace: vault
  chart:
    spec:
      chart: vault-secrets-operator
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
      interval: 1m
  values:
    defaultVaultConnection:
      enabled: true
      address: http://vault.vault.svc:8200
    defaultAuthMethod:
      enabled: true
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: monitoring
        serviceAccount: vault-secrets-operator-default
