---
# Pre-existing Kubernetes Secret consumed by the Application below.
# In a real deployment this Secret is provisioned by your secret-store integration
# (External Secrets Operator, Sealed Secrets, SOPS, Vault, ...) rather than committed
# alongside the Application manifest. Only credentials live in the Secret; endpoint
# URLs stay inline in the manifest below where they are easier to review and update.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-credentials
  namespace: default
type: Opaque
stringData:
  prometheus-username: promuser
  loki-username: loki
  access-token: testpassword
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring-application
  namespace: argocd
operation:
  sync:
    syncStrategy:
      hook: {}
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
      enabled: true
    syncOptions:
      - Retry=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  source:
    repoURL: https://github.com/grafana/k8s-monitoring-helm.git
    path: charts/k8s-monitoring
    targetRevision: "main"
    helm:
      releaseName: k8smon
      valuesObject:
        cluster:
          name: argocd-external-secrets-test
        destinations:
          localPrometheus:
            type: prometheus
            url: http://prometheus-server.prometheus.svc:9090/api/v1/write
            auth:
              type: basic
              usernameKey: prometheus-username
              passwordKey: access-token
            secret:
              create: false
              name: grafana-cloud-credentials
              namespace: default
          localLoki:
            type: loki
            url: http://loki.loki.svc:3100/loki/api/v1/push
            tenantId: "1"
            auth:
              type: basic
              usernameKey: loki-username
              passwordKey: access-token
            secret:
              create: false
              name: grafana-cloud-credentials
              namespace: default
        clusterMetrics:
          enabled: true
          collector: alloy-metrics

        costMetrics:
          enabled: true
          collector: alloy-metrics

        hostMetrics:
          enabled: true
          collector: alloy-metrics
          linuxHosts:
            enabled: true
          windowsHosts:
            enabled: true
          energyMetrics:
            enabled: true

        clusterEvents:
          enabled: true
          collector: alloy-singleton

        podLogsViaLoki:
          enabled: true
          collector: alloy-logs
          structuredMetadata:
            pod: ""

        collectors:
          alloy-metrics:
            presets: [clustered, statefulset]
          alloy-logs:
            presets: [filesystem-log-reader, daemonset]
          alloy-singleton:
            presets: [singleton]

        collectorCommon:
          alloy:
            annotations:
              argocd.argoproj.io/sync-wave: "1"

        telemetryServices:
          kube-state-metrics:
            deploy: true
          node-exporter:
            deploy: true
          windows-exporter:
            deploy: true
          kepler:
            deploy: true
          opencost:
            deploy: true
            metricsSource: localPrometheus
            annotations:
              argocd.argoproj.io/sync-wave: "1"
            opencost:
              exporter:
                defaultClusterId: argocd-external-secrets-test
              prometheus:
                existingSecretName: grafana-cloud-credentials
                username_key: prometheus-username
                password_key: access-token
                external:
                  url: http://prometheus-server.prometheus.svc:9090
