---
cluster:
  name: loki-meta-monitoring-cluster

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push
  tempo:
    type: otlp
    protocol: http
    url: http://tempo.tempo.svc:443/otlp
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

integrations:
  # attach available node labels to all integration metrics collection
  nodeLabels:
    nodepool: true
    region: true
    availability_zone: true
    node_role: true
    os: true
    architecture: true
    instance_type: true

  alloy:
    instances:
      # monitor the collector gathering and sending meta-monitoring metrics/logs to the meta-monitoring cluster
      - name: alloy-in-logs
        namespaces:
          - logs
        labelSelectors:
          app.kubernetes.io/name: alloy

      # monitor the collectors gathering and sending metrics/logs to the local cluster
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name: [alloy-singleton, alloy-metrics, alloy-logs, alloy-profiles, alloy-receiver]
        namespaces:
          - collectors

  grafana:
    instances:
      - name: grafana
        namespaces:
          - o11y
        labelSelectors:
          app.kubernetes.io/name: grafana

  loki:
    instances:
      - name: loki
        namespaces:
          - logs
        labelSelectors:
          app.kubernetes.io/name: loki
        logs:
          tuning:
            # extract logfmt fields and set them as structured metadata
            structuredMetadata:
              caller:
              tenant:
              org_id:
              user:
  mimir:
    instances:
      - name: mimir
        namespaces:
          - metrics
        labelSelectors:
          app.kubernetes.io/name: mimir
        logs:
          tuning:
            # extract logfmt fields and set them as structured metadata
            structuredMetadata:
              caller:
              tenant:
              org_id:
              user:

clusterEvents:
  enabled: true
  namespaces:
    - collectors
    - logs
    - metrics
    - o11y

clusterMetrics:
  enabled: true
  kubelet:
    enabled: false
  kubeletResource:
    enabled: false
  cadvisor:
    enabled: true
    extraMetricProcessingRules: |-
      rule {
        action = "keep"
        source_labels = ["namespace"]
        regex = "collectors|logs|metrics|o11y"
      }
  kube-state-metrics:
    metricsTuning:
      useDefaultAllowList: false
      includeMetrics: [(.+)]

hostMetrics:
  enabled: true
  linuxHosts:
    enabled: true
    metricsTuning:
      useIntegrationAllowList: true

podLogsViaLoki:
  enabled: true
  includeNamespaces: [collectors, logs, metrics, o11y]

  nodeLabels:
    nodePool: true
    region: true
    availabilityZone: true
    nodeRole: true
    os: true
    architecture: true
    instanceType: true

  structuredMetadata:
    nodepool:
    region:
    availability_zone:
    node_role:
    os:
    architecture:
    instance_type:

  namespaces:
    - collectors
    - logs
    - metrics
    - o11y

applicationObservability:
  enabled: true
  receivers:
    jaeger:
      thriftHttp:
        enabled: true
        port: 14268
  processors:
    k8sattributes:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.container.name

# Collectors
collectors:
  alloy:
    presets: [clustered, daemonset, filesystem-log-reader]

telemetryServices:
  kube-state-metrics:
    deploy: true
    namespaces: collectors,logs,metrics,o11y
  node-exporter:
    deploy: true
