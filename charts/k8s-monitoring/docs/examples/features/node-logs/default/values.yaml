---
cluster:
  name: node-logs-cluster

destinations:
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

nodeLogs:
  enabled: true
  collector: alloy-logs
  journal:
    units:
      - kubelet.service
      - containerd.service

collectors:
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
