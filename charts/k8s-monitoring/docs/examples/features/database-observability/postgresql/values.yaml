---
cluster:
  name: db-o11y-postgresql-test-cluster

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

integrations:
  collector: alloy-metrics
  postgresql:
    instances:
      - name: test-database
        jobLabel: integrations/db-o11y
        exporter:
          dataSource:
            host: test-database-postgresql.postgresql.svc
            database: postgres
            auth:
              usernameKey: postgres-username
              passwordKey: postgres-password
            sslmode: disable
          autoDiscovery:
            enabled: true
          collectors:
            statStatements:
              enabled: true
        databaseObservability:
          enabled: true
        secret:
          create: false
          name: test-database-postgresql
          namespace: postgresql
        logs:
          enabled: true
          labelSelectors:
            app.kubernetes.io/instance: test-database


podLogs:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-metrics:
    alloy:
      stabilityLevel: experimental

  alloy-logs: {}
