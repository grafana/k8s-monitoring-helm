---
cluster:
  name: pod-logs-via-k8s-api-cluster

destinations:
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs
  namespaces: [production]

collectors:
  alloy-logs:
    alloy:
      clustering:
        enabled: true

