---
cluster:
  name: grafana-integration-cluster

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push

integrations:
  collector: alloy-metrics
  grafana:
    instances:
      - name: grafana
        labelSelectors:
          app.kubernetes.io/name: grafana
        namespaces:
          - o11y

podLogs:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-metrics: {}

  alloy-logs: {}
