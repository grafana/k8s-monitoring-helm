---
cluster:
  name: applications-cluster

destinations:
  otlp-gateway:
    type: otlp
    url: http://otlp-gateway.example.com
    metrics: {enabled: true}
    logs: {enabled: true}
    traces: {enabled: true}

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      http:
        enabled: true

collectors:
  alloy-receiver: {}
