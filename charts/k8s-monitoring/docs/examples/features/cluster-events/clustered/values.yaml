---
cluster:
  name: cluster-events-clustered-cluster

destinations:
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

clusterEvents:
  enabled: true
  clustering: true
  collector: alloy-events

collectors:
  alloy-events:
    presets: [clustered, deployment]
    controller:
      replicas: 2
