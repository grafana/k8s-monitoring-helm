---
cluster:
  name: kubernetes-manifest-cluster

destinations:
  - name: loki
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

kubernetesManifests:
  enabled: true

  namespaces: [default]

alloy-singleton:
  enabled: true
  liveDebugging:
    enabled: true
  alloy:
    stabilityLevel: public-preview
