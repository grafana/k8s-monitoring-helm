---
cluster:
  name: cluster-metrics-example-cluster

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write

clusterMetrics:
  enabled: true
  collector: alloy-metrics

collectors:
  alloy-metrics: {}

telemetryServices:
  kube-state-metrics:
    deploy: true
