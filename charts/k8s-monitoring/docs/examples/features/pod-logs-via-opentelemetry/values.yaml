---
cluster:
  name: pod-logs-via-opentelemetry

destinations:
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword

podLogsViaOpenTelemetry:
  enabled: true
  namespaces:
    - development
    - production
  namespaceLabels:
    color: color

collectors:
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    alloy:
      stabilityLevel: public-preview
