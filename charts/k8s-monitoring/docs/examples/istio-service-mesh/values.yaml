---
cluster:
  name: istio-service-mesh-test

destinations:
  localPrometheus:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
    auth:
      type: basic
      username: promuser
      password: prometheuspassword
  localLoki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: "1"
    auth:
      type: basic
      username: loki
      password: lokipassword
  localTempo:
    type: otlp
    url: tempo.tempo.svc:4317
    tls:
      insecure: true
      insecureSkipVerify: true
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogs:
  enabled: true
  collector: alloy-logs

integrations:
  collector: alloy-metrics
  istio:
    instances:
      - name: istio
        sidecarMetrics:
          enabled: true
        istiodMetrics:
          enabled: true

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  connectors:
    grafanaCloudMetrics:
      enabled: true
  logs:
    enabled: false

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    alloy:
      clustering:
        portName: tcp
    controller:
      replicas: 2  # To test that clustering is working
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
  alloy-singleton:
    presets: [singleton]
  alloy-receiver:
    controller:
      # Using TPROXY preserves both the source and destination IP addresses and ports, which allows
      # the k8sattributes processor to look up the pod by IP and enrich the rest of the attributes
      podAnnotations:
        sidecar.istio.io/interceptionMode: TPROXY

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
