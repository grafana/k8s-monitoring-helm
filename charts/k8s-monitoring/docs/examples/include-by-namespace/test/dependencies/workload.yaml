---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noisy-app
  labels:
    app: noisy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noisy-app
  template:
    metadata:
      labels:
        app: noisy-app
    spec:
      containers:
        - name: busybox
          image: busybox
          args:
            - /bin/sh
            - -c
            - |
              echo "level=INFO Starting..."
              while true; do
                if [ $RANDOM -gt ${ERROR_THRESHOLD} ]; then
                  echo "level=ERROR Something went wrong"
                else
                  echo "level=INFO Everything is fine"
                fi
                sleep 5
              done
          env:
            - name: ERROR_THRESHOLD
              value: "10000"
