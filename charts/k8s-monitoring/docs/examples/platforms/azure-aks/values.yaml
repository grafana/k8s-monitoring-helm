---
cluster:
  name: azure-aks-example-cluster

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write

  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  kube-state-metrics:
    podAnnotations: {kubernetes.azure.com/set-kube-service-host-fqdn: "true"}

clusterEvents:
  enabled: true
  collector: alloy-singleton

hostMetrics:
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

podLogs:
  enabled: true
  collector: alloy-logs

collectorCommon:
  alloy:
    controller:
      podAnnotations: {kubernetes.azure.com/set-kube-service-host-fqdn: "true"}

collectors:
  alloy-metrics: {}

  alloy-singleton: {}

  alloy-logs: {}

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
