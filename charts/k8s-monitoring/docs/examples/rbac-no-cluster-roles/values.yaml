---
cluster:
  name: no-cluster-roles

destinations:
  metric-store:
    type: prometheus
    url: http://prometheus-server.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: 1
    auth:
      type: basic
      username: loki
      password: lokipassword

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  # These features require listing Nodes, which require ClusterRoles, so must be disabled.
  kubelet:
    enabled: false
  kubeletResource:
    enabled: false
  kubeletProbes:
    enabled: false
  cadvisor:
    enabled: false

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

clusterEvents:
  enabled: true
  collector: alloy-singleton
  namespaces: [default]

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  namespaces: [default]

collectorCommon:
  alloy:
    rbac:
      namespaces: [default]

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-singleton:
    presets: [singleton]
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]

alloy-operator:
  ownNamespaceOnly: true
  rbac:
    createClusterRoles: false

telemetryServices:
  kube-state-metrics:
    deploy: true
    namespaces: default
    rbac:
      useClusterRole: false
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
