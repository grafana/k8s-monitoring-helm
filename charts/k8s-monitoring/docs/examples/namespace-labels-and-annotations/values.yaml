---
cluster:
  name: pod-labels-and-annotations

destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push
  tempo:
    type: otlp
    url: http://tempo.tempo.svc
    metrics: {enabled: false}
    logs: {enabled: false}
    traces: {enabled: true}

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

podLogs:
  enabled: true
  collector: alloy-logs

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      http:
        enabled: true
        port: 4318
  connectors:
    grafanaCloudMetrics:
      enabled: true
  processors:
    k8sattributes:
      annotations:
        - from: namespace
          key: "example.com/product"
          # This is the name of the label that will be used to store the product as label if available
          tag_name: "product"
      labels:
        - from: namespace
          key: "example.com/team"
          # This is the name of the label that will be used to store the team as label if available
          tag_name: "team"
  metrics:
    transforms:
      datapoint:
        # This adds the product label to the datapoints and similarly you can add to traces and logs
        - set(attributes["product"], resource.attributes["product"])
        # This adds the team label to the datapoints and similarly you can add to traces and logs
        - set(attributes["team"], resource.attributes["team"])

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
  alloy-receiver:
    presets: [deployment]

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
