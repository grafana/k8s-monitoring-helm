---
apiVersion: v1
kind: Namespace
metadata:
  name: mimir
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: mimir
data:
  mimir.yaml: |
    multitenancy_enabled: false
    target: all,alertmanager,overrides-exporter

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/blocks

    blocks_storage:
      backend: filesystem
      bucket_store:
        sync_dir: /data/tsdb-sync
      filesystem:
        dir: /data/blocks
      tsdb:
        dir: /data/tsdb

    ruler:
      rule_path: /data/rules
      alertmanager_url: http://localhost:9009/alertmanager
      ring:
        replication_factor: 1
      enable_api: true

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler

    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/alertmanager

    alertmanager:
      data_dir: /data/alertmanager
      external_url: /alertmanager
      sharding_ring:
        replication_factor: 1

    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist

    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist

    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1
        final_sleep: 0s

    store_gateway:
      sharding_ring:
        replication_factor: 1

    memberlist:
      bind_addr: ["127.0.0.1"]

    limits:
      ruler_max_rules_per_rule_group: 50
      ruler_max_rule_groups_per_tenant: 100
      ingestion_rate: 100000
      ingestion_burst_size: 1000000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: mimir
spec:
  replicas: 1
  selector:
    matchLabels: {app: mimir}
  template:
    metadata:
      labels: {app: mimir}
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.13.0
          args:
            - -config.file=/etc/mimir/mimir.yaml
          ports:
            - {name: http, containerPort: 9009}
            - {name: grpc, containerPort: 9095}
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - {name: config, mountPath: /etc/mimir}
            - {name: data, mountPath: /data}
      volumes:
        - name: config
          configMap: {name: mimir-config}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: mimir
spec:
  selector: {app: mimir}
  ports:
    - {name: http, port: 9009, targetPort: http}
    - {name: grpc, port: 9095, targetPort: grpc}
