---
cluster:
  name: otlp-gateway-test

destinations:
  otlp-gateway:
    type: otlp
    url: https://{{ .Values.cluster.name }}.otlp-gateway-my-region.grafana.net/otlp
    protocol: http
    extraHeaders:
      x-cluster: "{{ .Values.cluster.name }}"
    auth:
      type: basic
      username: my-gateway-username
      password: my-gateway-password
    metrics: {enabled: true}
    logs: {enabled: true}
    traces: {enabled: true}
    processors:
      transform:
        traces:
          resource:
            - set(resource.attributes["quoted"], "quted")
          resourceFrom:
            - string.format(`set(attributes["from_env"], %q)`, coalesce(sys.env("MY_ENV"), "undefined"))

    sendingQueue:
      enabled: true
      blockOnOverflow: true
      storage: otelcol.storage.file.otlp_gateway_queue_storage.handler
      batch:
        enabled: true
        flushTimeout: 1s
        sizer: items
        minSize: 100
        maxSize: 1000

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: true

podLogsViaLoki:
  enabled: true
  collector: alloy-logs

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    extraConfig: |
      otelcol.storage.file "otlp_gateway_queue_storage" {
        create_directory = true
        directory = "/var/lib/otlp_gateway_queue_storage"
      }

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    extraConfig: |
      otelcol.storage.file "otlp_gateway_queue_storage" {
        create_directory = true
        directory = "/var/lib/otlp_gateway_queue_storage"
      }

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: true
