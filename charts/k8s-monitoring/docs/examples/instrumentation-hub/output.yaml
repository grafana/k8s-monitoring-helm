# Source: k8s-monitoring/templates/alloy-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8smon-my-collector
  namespace: default
data:
  config.alloy: |
    remote.kubernetes.secret "my_collector_remote_cfg" {
      name      = "my-collector-remote-cfg-k8smon-k8s-monitoring"
      namespace = "default"
    }
    
    remotecfg {
      id = sys.env("GCLOUD_FM_COLLECTOR_ID")
      url = "https://remote-config.example.com/alloy"
      basic_auth {
        username = convert.nonsensitive(remote.kubernetes.secret.my_collector_remote_cfg.data["username"])
        password = remote.kubernetes.secret.my_collector_remote_cfg.data["password"]
      }
      tls_config {
        insecure_skip_verify = false
      }
      poll_frequency = "5m"
      attributes = {
        "cluster" = "instrumentation-hub-test-cluster",
        "namespace" = "default",
        "platform" = "kubernetes",
        "release" = "k8smon",
        "source" = "k8s-monitoring",
        "sourceVersion" = "4.0.0-rc.1",
        "workloadName" = "my-collector",
        "workloadType" = "daemonset",
      }
    }
