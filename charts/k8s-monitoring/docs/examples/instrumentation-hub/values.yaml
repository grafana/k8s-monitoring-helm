cluster:
  name: instrumentation-hub-test-cluster

telemetryServices:
  node-exporter:
    deploy: true

  kube-state-metrics:
    deploy: true

collectorCommon:
  alloy:
    remoteConfig:
      enabled: true
      url: https://remote-config.example.com/alloy
      auth:
        type: basic
        username: 12345
        password: my-remote-cfg-password

collectors:
  my-collector:
    presets: [daemonset]
