---
cluster:
  name: remote-config-example-cluster

collectorCommon:
  alloy:
    remoteConfig:
      enabled: true
      url: https://remote-config.example.com/alloy
      auth:
        type: basic
        username: 12345
        password: my-remote-cfg-password

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
