# Source: k8s-monitoring/charts/alloy-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8smon-alloy-operator
  labels:
    helm.sh/chart: alloy-operator-0.2.2-beta.2
    app.kubernetes.io/name: alloy-operator
    app.kubernetes.io/instance: k8smon
    app.kubernetes.io/version: "0.12.5"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy-operator
      app.kubernetes.io/instance: k8smon
  template:
    metadata:
      labels:
        helm.sh/chart: alloy-operator-0.2.2-beta.2
        app.kubernetes.io/name: alloy-operator
        app.kubernetes.io/instance: k8smon
        app.kubernetes.io/version: "0.12.5"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: k8smon-alloy-operator
      containers:
        - name: alloy-operator
          image: "ghcr.io/grafana/alloy-operator:0.12.5"
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --leader-election-id=k8smon-alloy-operator
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8082
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
---
# Source: k8s-monitoring/templates/alloy.yaml
apiVersion: collectors.grafana.com/v1alpha1
kind: Alloy
metadata:
  name: k8smon-alloy-metrics
  namespace: default
spec: 
  alloy:
    clustering:
      enabled: true
      name: alloy-metrics
    configMap:
      create: false
    nodeSelector:
      kubernetes.io/os: linux
    podAnnotations:
      k8s.grafana.com/logs.job: integrations/alloy
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        add:
        - CHOWN
        - DAC_OVERRIDE
        - FOWNER
        - FSETID
        - KILL
        - SETGID
        - SETUID
        - SETPCAP
        - NET_BIND_SERVICE
        - NET_RAW
        - SYS_CHROOT
        - MKNOD
        - AUDIT_WRITE
        - SETFCAP
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
  collectorName: alloy-metrics
  controller:
    nodeSelector:
      kubernetes.io/os: linux
    podAnnotations:
      k8s.grafana.com/logs.job: integrations/alloy
    replicas: 1
    type: statefulset
  crds:
    create: false
  enabled: true
  extraConfig: |-
    remote.kubernetes.secret "mongodb_atlas" {
      name = "mongodb-atlas"
      namespace = "monitoring"
    }
  
    discovery.http "mongodb_atlas" {
      url = string.format("https://cloud.mongodb.com/prometheus/v1.0/groups/%s/discovery", remote.kubernetes.secret.mongodb_atlas.data["group_id"])
  
      basic_auth {
        username = nonsensitive(remote.kubernetes.secret.mongodb_atlas.data["username"])
        password = remote.kubernetes.secret.mongodb_atlas.data["password"]
      }
    }
  
    prometheus.scrape "mongodb_atlas" {
      targets         = discovery.http.mongodb_atlas.targets
      job_name        = "integrations/mongodb-atlas"
      scrape_interval = "10s"
      scheme          = "https"
  
      basic_auth {
        username = nonsensitive(remote.kubernetes.secret.mongodb_atlas.data["username"])
        password = remote.kubernetes.secret.mongodb_atlas.data["password"]
      }
  
      forward_to = [prometheus.remote_write.prometheus.receiver]
    }
  liveDebugging:
    enabled: false
  logging:
    format: logfmt
    level: info
  remoteConfig:
    auth:
      password: ""
      passwordFrom: ""
      passwordKey: password
      type: none
      username: ""
      usernameFrom: ""
      usernameKey: username
    enabled: false
    extraAttributes: {}
    name: alloy-metrics-remote-cfg
    pollFrequency: 5m
    secret:
      create: true
      embed: false
      name: ""
      namespace: ""
    type: remoteConfig
    url: ""
