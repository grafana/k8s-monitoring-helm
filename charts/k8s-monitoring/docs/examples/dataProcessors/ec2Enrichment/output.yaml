apiVersion: batch/v1
kind: Job
metadata:
  name: k8smon-k8s-monitoring-remove-alloy-and-finalizer
  namespace: default
  labels:
    app.kubernetes.io/name: k8smon-k8s-monitoring-remove-alloy-and-finalizer
    app.kubernetes.io/instance: k8smon
    helm.sh/chart: k8s-monitoring-4.1.7
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      name: k8smon-k8s-monitoring-remove-alloy-and-finalizer
      labels:
        app.kubernetes.io/name: k8smon-k8s-monitoring
        app.kubernetes.io/instance: k8smon
        linkerd.io/inject: disabled
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: k8smon-k8s-monitoring-remove-alloy-and-finalizer
      containers:
        - name: remove-finalizers
          image: "ghcr.io/grafana/helm-chart-toolbox-kubectl:0.1.2"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ce
            - |
              echo "Deleting Alloy instance: alloy/k8smon-alloy..."
              kubectl delete alloy/k8smon-alloy --ignore-not-found=true --wait
              kubectl wait --for=delete alloy/k8smon-alloy --timeout=60s || echo "Timed out waiting for deletion of alloy/k8smon-alloy or it may not exist."

              kubectl patch \
                --namespace=default \
                --type merge \
                --patch='{"metadata":{"finalizers":null}}' \
                deployment/k8smon-alloy-operator
