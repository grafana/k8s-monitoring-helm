---
apiVersion: helm-chart-toolbox.grafana.com/v1
kind: TestPlan
name: custom-collector-audit-logs

subject:
  releaseName: k8smon
  path: ../../../..
  valuesFile: values.yaml

cluster:
  type: kind
  configFile: kind-cluster-config.yaml

dependencies:
  - preset: loki
  - preset: grafana
    overrides:
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Loki
              type: loki
              url: http://loki.loki.svc:3100
              jsonData:
                httpHeaderName1: X-Scope-OrgID
              secureJsonData:
                httpHeaderValue1: "1"
              isDefault: true

tests:
  - type: query-test
    values:
      tests:
        - env:
            CLUSTER: custom-collector-audit-logs-test
            LOKI_URL: http://loki.loki.svc:3100/loki/api/v1/query
            LOKI_TENANTID: 1
            LOKI_USER: loki
            LOKI_PASS: lokipassword

          queries:
            # Audit logs are being collected and forwarded to Loki
            - query: count_over_time({cluster="$CLUSTER", job="integrations/kubernetes-audit"}[1h])
              type: logql

            # Audit logs have the component label
            - query: count_over_time({cluster="$CLUSTER", job="integrations/kubernetes-audit", component="audit"}[1h])
              type: logql
