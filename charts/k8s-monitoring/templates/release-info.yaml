{{- if eq (include "features.selfReporting.enabled" .) "true" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helper.fullname" . }}-release-info
  namespace: {{ .Release.Namespace }}
data:
  cluster: {{ .Values.cluster.name | quote }}
  self-reporting-metric.prom: |+{{ printf "%s\n" (include "features.selfReporting.metrics" . | trim) | nindent 4 }}
{{ end }}
