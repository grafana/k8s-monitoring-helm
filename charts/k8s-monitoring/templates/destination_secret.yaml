{{- range $destinationName, $destination := $.Values.destinations }}
{{- if eq (include "secrets.shouldCreateKubernetesSecret" $destination ) "true" }}
{{- $defaultValues := (printf "destinations/%s-values.yaml" $destination.type) | $.Files.Get | fromYaml }}
{{- $destination = mergeOverwrite $defaultValues $destination }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "secrets.kubernetesSecretName" (dict "Values" $.Values "Chart" $.Chart "Release" $.Release "object" $destination "name"  $destinationName) | quote }}
  namespace: {{ include "secrets.kubernetesSecretNamespace" (dict "Release" $.Release "object" $destination) | quote }}
type: Opaque
data:
{{- $secrets := include (printf "secrets.list.%s" $destination.type) . | fromYamlArray }}
{{- range $secret := $secrets }}
  {{- $value := include "secrets.getSecretValue" (dict "object" $destination "key" $secret) -}}
  {{- if $value }}
  {{ include "secrets.getSecretKey" (dict "object" $destination "key" $secret) }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end -}}
{{- end -}}
