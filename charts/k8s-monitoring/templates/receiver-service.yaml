{{- range $collectorName := keys .Values.collectors | sortAlpha }}
  {{- if (dig "extraService" "enabled" false (get $.Values.collectors $collectorName | default dict)) }}
    {{- $values := dict "Values" $.Values "Chart" $.Chart "Release" $.Release "Files" $.Files "collectorName" $collectorName }}
    {{- $collectorValues := include "collector.alloy.valuesWithUpstream" $values | fromYaml }}

    {{- $name := printf "%s-%s" $.Release.Name ($collectorValues.extraService.name | default "alloy")| trunc 63 | trimSuffix "-" }}
    {{- if $collectorValues.extraService.fullname }}
      {{- $name = $collectorValues.extraService.fullname }}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:{{ include "collector.alloy.labels" $values | nindent 4 }}
    app.kubernetes.io/component: networking
  {{- with $collectorValues.service.annotations }}
  annotations:{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $collectorValues.service.type }}
  {{- if $collectorValues.service.clusterIP }}
  clusterIP: {{ $collectorValues.service.clusterIP }}
  {{- end }}
  selector:{{ include "collector.alloy.selectorLabels" $values | nindent 4 }}
  {{- if semverCompare ">=1.26-0" $.Capabilities.KubeVersion.Version }}
  internalTrafficPolicy: {{ $collectorValues.service.internalTrafficPolicy}}
  {{- end }}
  ports:
    - name: http-metrics
      {{- if eq $collectorValues.service.type "NodePort" }}
      nodePort: {{ $collectorValues.service.nodePort }}
      {{- end }}
      port: {{ $collectorValues.alloy.listenPort }}
      targetPort: {{ $collectorValues.alloy.listenPort }}
      protocol: "TCP"
{{- range $portMap := $collectorValues.alloy.extraPorts }}
    - name: {{ $portMap.name }}
      port: {{ $portMap.port }}
      targetPort: {{ $portMap.targetPort }}
      protocol: {{ coalesce $portMap.protocol "TCP" }}
{{- end }}
  {{- end }}
{{- end }}
