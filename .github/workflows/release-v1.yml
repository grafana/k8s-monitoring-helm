# yamllint disable rule:line-length
---
name: Release Helm chart v1
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

env:
  CR_INDEX_PATH: "${{ github.workspace }}/.cr-index"
  CR_PACKAGE_PATH: "${{ github.workspace }}/.cr-release-packages"
  CR_TOOL_PATH: "${{ github.workspace }}/.cr-tool"

permissions: {}

jobs:
  release-chart:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@d7c4f4491dbe46d853833cd15a35159c28061f39
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: charts
      cr_configfile: .github/configs/cr.yaml
      ct_configfile: charts/k8s-monitoring-v1/.ct.yaml
      github_app: kubernetes-monitoring-helm-chart

  release:
    runs-on: ubuntu-latest
    needs: release-chart

    # These permissions are needed to assume roles from GitHub's OIDC.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          path: source
          persist-credentials: 'false'

      - name: Configure Git
        run: |
          cd source
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v4.2.0  # pin to 4.1.x; 4.2.x changes template output formatting (helm/helm#32132)

      - name: Parse Chart.yaml
        id: parse-chart
        working-directory: source/charts/k8s-monitoring-v1
        run: |
          name=$(yq ".name" < Chart.yaml)
          version=$(yq ".version" < Chart.yaml)
          {
            echo "chartpath=charts/$(basename "$(pwd)")";
            echo "tagname=${name}-${version}";
            echo "packagename=${name}-${version}";
          } >> "${GITHUB_OUTPUT}"

      - name: Add dependency chart repos
        env:
          CHARTPATH: ${{ steps.parse-chart.outputs.chartpath }}
        working-directory: source
        run: |
          # Skip the header line and make sure that tabs are expanded into spaces
          deps=$(helm dependency list "${CHARTPATH}" | tail +2 | expand)
          while read -r row; do
            IFS=' ' read -ra parts <<< "$row"
            name="${parts[0]}"
            repo="${parts[2]}"
            case "$repo" in
              "https://"*) helm repo add "$name" "$repo" ;;
              *) echo >&2 "Skipping dependency $name: unsupported schema for \"$repo\"" ;;
            esac
          done <<< "$deps"

      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e  # create-github-app-token/v0.3.1
        with:
          github_app: kubernetes-monitoring-helm-chart

      - name: Set the token
        env:
          APP_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
        run: echo "AUTHTOKEN=${APP_TOKEN}" >> "${GITHUB_ENV}"

      - name: Install CR tool
        env:
          GITHUB_TOKEN: ${{ env.AUTHTOKEN }}
        run: |
          mkdir "${CR_TOOL_PATH}"
          mkdir "${CR_PACKAGE_PATH}"
          mkdir "${CR_INDEX_PATH}"
          crVersion=$(gh release list --repo helm/chart-releaser --exclude-pre-releases --json tagName --jq '.[0].tagName' | sed 's/v//')
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${crVersion}/chart-releaser_${crVersion}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz -C "${CR_TOOL_PATH}"
          rm -f cr.tar.gz

      - name: Create Helm package
        env:
          CHARTPATH: ${{ steps.parse-chart.outputs.chartpath }}
        working-directory: source
        run: |
          "${CR_TOOL_PATH}/cr" package "${CHARTPATH}" --config .github/configs/cr.yaml --package-path "${CR_PACKAGE_PATH}"
          echo "Result of chart package:"
          ls -l "${CR_PACKAGE_PATH}"

      - name: Make GitHub release
        env:
          GH_TOKEN: ${{ env.AUTHTOKEN }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
          PACKAGENAME: ${{ steps.parse-chart.outputs.packagename }}
          REPOSITORY: ${{ github.repository }}
        run: |
          notes_file=$(mktemp)
          {
            echo "v1 maintenance release. See the [chart directory at this tag](https://github.com/${REPOSITORY}/tree/${TAGNAME}/charts/k8s-monitoring-v1) for the source."
            echo ""
            echo "> **Note:** \`k8s-monitoring\` v1 is deprecated as of 2026-06-01. Please migrate to v4 (\`charts/k8s-monitoring\`)."
          } > "${notes_file}"
          gh release create "${TAGNAME}" \
            --title "${TAGNAME}" \
            --repo "grafana/k8s-monitoring-helm" \
            --notes-file "${notes_file}" \
            "${CR_PACKAGE_PATH}/${PACKAGENAME}.tgz"
