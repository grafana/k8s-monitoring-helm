---
name: Release Helm chart
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

permissions: {}

jobs:
  verify-signatures:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v4.1.4

      - name: Verify signed chart dependencies
        run: make -C charts/k8s-monitoring verify-signatures

  release-chart:
    needs: verify-signatures
    # Pinned to the hackathon branch: this version of the shared workflow packages, signs,
    # pushes to GHCR, regenerates the helm repo index, and creates the canonical release on
    # grafana/helm-charts. The source-repo `release` job below only links back to it.
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@hackathon-17-verify-all-the-charts
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: charts
      cr_configfile: .github/configs/cr.yaml
      ct_configfile: charts/k8s-monitoring/.ct.yaml
      github_app: kubernetes-monitoring-helm-chart

  release:
    runs-on: ubuntu-latest
    needs: release-chart

    # The shared workflow above packages the chart, pushes it to GHCR, and creates the
    # canonical release on grafana/helm-charts. This job only needs to create a GitHub
    # release on this repo (with CHANGELOG-based notes) that links back to that release,
    # so plain contents:write on GITHUB_TOKEN is enough.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Parse Chart.yaml
        id: parse-chart
        working-directory: charts/k8s-monitoring
        run: |
          name=$(yq ".name" < Chart.yaml)
          version=$(yq ".version" < Chart.yaml)
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "tagname=${name}-${version}";
            echo "version=${version}";
            echo "prerelease=${prerelease}";
          } >> "${GITHUB_OUTPUT}"

      - name: Extract release notes from CHANGELOG
        id: release-notes
        env:
          VERSION: ${{ steps.parse-chart.outputs.version }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
        run: |
          changelog="charts/k8s-monitoring/CHANGELOG.md"
          notes_file="${RUNNER_TEMP}/release_notes.md"

          # Build the list of headers to try, in order:
          #   - the full version (e.g. "4.0.5")
          #   - the version with a trailing ".0" stripped (e.g. "4.1" for "4.1.0"),
          #     since the changelog sometimes drops the patch component on .0 releases
          candidates=("${VERSION}")
          if [[ "${VERSION}" == *.0 ]]; then
            candidates+=("${VERSION%.0}")
          fi

          extract() {
            awk -v ver="$1" '
              /^## / {
                if (found) exit
                header = $0
                sub(/^##[[:space:]]+/, "", header)
                if (header == ver) { found = 1; next }
                next
              }
              found { print }
            ' "$changelog"
          }

          body=""
          for candidate in "${candidates[@]}"; do
            body=$(extract "$candidate")
            # Trim leading/trailing blank lines for the emptiness check
            trimmed=$(printf '%s' "$body" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
            if [[ -n "$trimmed" ]]; then
              body="$trimmed"
              echo "Matched changelog section '## ${candidate}'"
              break
            fi
            body=""
          done

          if [[ -z "$body" ]]; then
            echo "::warning::No CHANGELOG.md section found for version ${VERSION}; falling back to a generic note."
            body="See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAGNAME}/charts/k8s-monitoring/CHANGELOG.md) for details."
          fi

          {
            echo "## What's changed"
            echo
            echo "$body"
            echo
            echo "---"
            echo
            echo "Chart released at https://github.com/grafana/helm-charts/releases/tag/${TAGNAME}"
            echo
            echo "Full changelog: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAGNAME}/charts/k8s-monitoring/CHANGELOG.md)"
          } > "$notes_file"

          echo "notes_path=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "----- Release notes -----"
          cat "$notes_file"
          echo "-------------------------"

      - name: Make GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
          NOTES_PATH: ${{ steps.release-notes.outputs.notes_path }}
          PRERELEASE: ${{ steps.parse-chart.outputs.prerelease }}
        run: |
          prerelease_flag=""
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${TAGNAME}" \
            --title "${TAGNAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file "${NOTES_PATH}" \
            ${prerelease_flag}
