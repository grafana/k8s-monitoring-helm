---
name: Release Helm chart
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

env:
  CR_INDEX_PATH: "${{ github.workspace }}/.cr-index"
  CR_PACKAGE_PATH: "${{ github.workspace }}/.cr-release-packages"
  CR_TOOL_PATH: "${{ github.workspace }}/.cr-tool"

permissions: {}

jobs:
  release-chart:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@fa81478435d74d219108506981c03827715068bc
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: charts
      cr_configfile: .github/configs/cr.yaml
      ct_configfile: charts/k8s-monitoring/.ct.yaml
    secrets:
      vault_repo_secret_name: github-app

  release:
    runs-on: ubuntu-latest
    needs: release-chart

    # These permissions are needed to assume roles from GitHub's OIDC.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          path: source
          persist-credentials: 'false'

      - name: Configure Git
        run: |
          cd source
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        id: setup-helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        continue-on-error: true

      - name: Set up Homebrew
        if: ${{ steps.setup-helm.outcome == 'failure' }}
        uses: Homebrew/actions/setup-homebrew@fb0fe15d936a80ac0ba4c6cee691bc3da3f00f4e

      - name: Install Helm
        if: ${{ steps.setup-helm.outcome == 'failure' }}
        run: brew install helm

      - name: Parse Chart.yaml
        id: parse-chart
        working-directory: source/charts/k8s-monitoring
        run: |
          name=$(yq ".name" < Chart.yaml)
          version=$(yq ".version" < Chart.yaml)
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "chartpath=charts/$(basename "$(pwd)")";
            echo "tagname=${name}-${version}";
            echo "packagename=${name}-${version}";
            echo "version=${version}";
            echo "prerelease=${prerelease}";
          } >> "${GITHUB_OUTPUT}"

      - name: Extract release notes from CHANGELOG
        id: release-notes
        working-directory: source
        env:
          VERSION: ${{ steps.parse-chart.outputs.version }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
        run: |
          changelog="charts/k8s-monitoring/CHANGELOG.md"
          notes_file="${RUNNER_TEMP}/release_notes.md"

          # Build the list of headers to try, in order:
          #   - the full version (e.g. "4.0.5")
          #   - the version with a trailing ".0" stripped (e.g. "4.1" for "4.1.0"),
          #     since the changelog sometimes drops the patch component on .0 releases
          candidates=("${VERSION}")
          if [[ "${VERSION}" == *.0 ]]; then
            candidates+=("${VERSION%.0}")
          fi

          extract() {
            awk -v ver="$1" '
              /^## / {
                if (found) exit
                header = $0
                sub(/^##[[:space:]]+/, "", header)
                if (header == ver) { found = 1; next }
                next
              }
              found { print }
            ' "$changelog"
          }

          body=""
          for candidate in "${candidates[@]}"; do
            body=$(extract "$candidate")
            # Trim leading/trailing blank lines for the emptiness check
            trimmed=$(printf '%s' "$body" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
            if [[ -n "$trimmed" ]]; then
              body="$trimmed"
              echo "Matched changelog section '## ${candidate}'"
              break
            fi
            body=""
          done

          if [[ -z "$body" ]]; then
            echo "::warning::No CHANGELOG.md section found for version ${VERSION}; falling back to a generic note."
            body="See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAGNAME}/charts/k8s-monitoring/CHANGELOG.md) for details."
          fi

          {
            echo "## What's changed"
            echo
            echo "$body"
            echo
            echo "---"
            echo
            echo "Full changelog: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAGNAME}/charts/k8s-monitoring/CHANGELOG.md)"
          } > "$notes_file"

          echo "notes_path=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "----- Release notes -----"
          cat "$notes_file"
          echo "-------------------------"

      - name: Add dependency chart repos
        env:
          CHARTPATH: ${{ steps.parse-chart.outputs.chartpath }}
        working-directory: source
        run: |
          # Skip the header line and make sure that tabs are expanded into spaces
          deps=$(helm dependency list "${CHARTPATH}" | tail +2 | expand)
          while read -r row; do
            IFS=' ' read -ra parts <<< "$row"
            name="${parts[0]}"
            repo="${parts[2]}"
            case "$repo" in
              "https://"*) helm repo add "$name" "$repo" ;;
              *) echo >&2 "Skipping dependency $name: unsupported schema for \"$repo\"" ;;
            esac
          done <<< "$deps"

      - name: Retrieve GitHub App credentials from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a37de51f3d713a30a9e4b21bcdfbd38170020593  # v1.1.0
        env:
          VAULT_REPO_SECRET_NAME: github-app
        with:
          repo_secrets: |
            GITHUB_APP_ID=${{ env.VAULT_REPO_SECRET_NAME }}:app-id
            PRIVATE_KEY=${{ env.VAULT_REPO_SECRET_NAME }}:private-key

      - name: Generate GitHub App Token
        if: env.GITHUB_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          # Variables generated by the previous step get-secrets
          app-id: ${{ env.GITHUB_APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set the token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "AUTHTOKEN=${APP_TOKEN}" >> "${GITHUB_ENV}"

      - name: Install CR tool
        env:
          GITHUB_TOKEN: ${{ env.AUTHTOKEN }}
        run: |
          mkdir "${CR_TOOL_PATH}"
          mkdir "${CR_PACKAGE_PATH}"
          mkdir "${CR_INDEX_PATH}"
          crVersion=$(gh release list --repo helm/chart-releaser --exclude-pre-releases --json tagName --jq '.[0].tagName' | sed 's/v//')
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${crVersion}/chart-releaser_${crVersion}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz -C "${CR_TOOL_PATH}"
          rm -f cr.tar.gz

      - name: Create helm package
        env:
          CHARTPATH: ${{ steps.parse-chart.outputs.chartpath }}
        working-directory: source
        run: |
          "${CR_TOOL_PATH}/cr" package "${CHARTPATH}" --config .github/configs/cr.yaml --package-path "${CR_PACKAGE_PATH}"
          echo "Result of chart package:"
          ls -l "${CR_PACKAGE_PATH}"

      - name: Make github release
        env:
          GH_TOKEN: ${{ env.AUTHTOKEN }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
          PACKAGENAME: ${{ steps.parse-chart.outputs.packagename }}
          NOTES_PATH: ${{ steps.release-notes.outputs.notes_path }}
          PRERELEASE: ${{ steps.parse-chart.outputs.prerelease }}
        run: |
          prerelease_flag=""
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${TAGNAME}" \
            --title "${TAGNAME}" \
            --repo "grafana/k8s-monitoring-helm" \
            --notes-file "${NOTES_PATH}" \
            ${prerelease_flag} \
            "${CR_PACKAGE_PATH}/${PACKAGENAME}.tgz"
